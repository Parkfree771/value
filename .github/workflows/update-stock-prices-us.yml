name: Update Stock Prices (US)

on:
  schedule:
    # 미국 시장 백업 (로컬 스케줄러 보조)
    # 장 시작 22:30 KST = 13:30 UTC
    # 중간   01:00 KST = 16:00 UTC
    # 장 마감 05:30 KST = 20:30 UTC (평일만)
    - cron: '30 13,16,20 * * 1-5'
  workflow_dispatch:
    inputs:
      market_type:
        description: 'Market type to update'
        required: false
        default: 'US'

jobs:
  update-prices-us:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update US stock prices
        env:
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_BASE_URL: https://openapi.koreainvestment.com:9443
          MARKET_TYPE: US
        run: npx tsx scripts/github-update-prices.ts

      - name: Revalidate pages
        if: success()
        run: |
          curl -X POST "${{ secrets.SITE_URL }}/api/revalidate" \
            -H "Content-Type: application/json" \
            -d '{"path": "/"}' \
            --fail --silent --show-error || echo "Revalidate failed, but continuing..."
