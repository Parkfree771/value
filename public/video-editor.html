<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AntStreet Video Editor</title>
  <style>
    @font-face {
      font-family: 'Galmuri11';
      src: url('https://cdn.jsdelivr.net/npm/galmuri/dist/Galmuri11.woff2') format('woff2');
      font-weight: normal;
    }
    @font-face {
      font-family: 'Galmuri11';
      src: url('https://cdn.jsdelivr.net/npm/galmuri/dist/Galmuri11-Bold.woff2') format('woff2');
      font-weight: bold;
    }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; margin: 0; font-family: 'Galmuri11', monospace; color: #e0dcd8; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .main-area { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    /* === 왼쪽: 미리보기 === */
    .preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
    }

    .canvas-scaler {
      transform-origin: top left;
      position: absolute;
    }

    /* === 영상 캔버스 === */
    .video-canvas {
      width: 1080px;
      height: 1920px;
      background: #1c1714;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .video-canvas.res-landscape { width: 1920px; height: 1080px; }
    .video-canvas.res-square { width: 1080px; height: 1080px; }

    .video-header {
      height: 140px;
      background: #1c1714;
      border-bottom: 4px solid #e94560;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-shrink: 0;
      position: relative;
    }
    .video-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(233,69,96,0.03) 3px, rgba(233,69,96,0.03) 4px);
    }
    .video-header .logo {
      width: 90px; height: 90px;
      image-rendering: pixelated;
      position: relative; z-index: 1;
    }
    .video-header .brand-name {
      font-family: 'Inter', Arial, sans-serif;
      font-weight: 900; font-size: 46px;
      letter-spacing: -0.03em;
      color: #e94560;
      position: relative; z-index: 1;
    }

    .video-header.hidden-header { display: none; }

    .video-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* 슬라이드 컨텐츠 영역 */
    .slide-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 70px;
      gap: 40px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .slide-layer.active { opacity: 1; }

    /* 레이아웃 타입 */
    .slide-layer.layout-text-only {
      justify-content: center;
    }
    .slide-layer.layout-image-top {
      justify-content: flex-start;
      padding-top: 40px;
    }
    .slide-layer.layout-image-center {
      justify-content: center;
    }
    .slide-layer.layout-image-bg {
      padding: 0;
    }

    .slide-title {
      font-family: 'Galmuri11', monospace;
      font-weight: bold; font-size: 60px;
      color: #e94560;
      text-align: center; line-height: 1.4;
      text-shadow: 3px 3px 0px #0d0a08;
      width: 100%;
    }
    .slide-title .cursor {
      display: inline-block; width: 4px; height: 60px;
      background: #e94560; margin-left: 4px;
      animation: blink 0.6s step-end infinite;
      vertical-align: middle;
    }

    .slide-body-text {
      font-family: 'Galmuri11', monospace;
      font-size: 38px;
      color: #e0dcd8;
      text-align: center; line-height: 1.7;
      width: 100%;
    }
    .slide-body-text .cursor {
      display: inline-block; width: 3px; height: 38px;
      background: #e0dcd8; margin-left: 3px;
      animation: blink 0.6s step-end infinite;
      vertical-align: middle;
    }

    .slide-subtitle {
      font-family: 'Galmuri11', monospace;
      font-size: 28px;
      color: #a09890;
      text-align: center; line-height: 1.5;
      position: absolute;
      bottom: 30px;
      left: 50px; right: 50px;
      z-index: 5;
    }

    .slide-image {
      max-width: 900px;
      max-height: 700px;
      object-fit: contain;
      border: 4px solid #3e3530;
      image-rendering: auto;
    }

    .slide-image-bg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.3;
    }

    .slide-image-bg + .slide-content-over {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; padding: 50px 70px; gap: 40px;
    }

    /* (footer, disclaimer, progress bar, slide indicator 제거됨) */

    /* Fade to black overlay */
    .fade-to-black-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      opacity: 0;
      z-index: 8;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .fade-to-black-overlay.active { opacity: 1; }

    /* === 오른쪽: 편집 패널 === */
    .editor {
      width: 420px;
      background: #111;
      border-left: 3px solid #e94560;
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .editor-header {
      padding: 16px 20px;
      background: #1c1714;
      border-bottom: 3px solid #3e3530;
      display: flex; justify-content: space-between; align-items: center;
    }
    .editor-header h2 { color: #e94560; font-size: 18px; }

    .editor-tabs {
      display: flex;
      border-bottom: 3px solid #3e3530;
    }
    .editor-tab {
      flex: 1; padding: 10px;
      background: #1c1714; color: #a09890;
      border: none; cursor: pointer;
      font-family: 'Galmuri11', monospace; font-size: 13px;
      border-right: 2px solid #3e3530;
    }
    .editor-tab:last-child { border-right: none; }
    .editor-tab.active { background: #2e2722; color: #e94560; }

    .editor-content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .editor-content h3 { color: #e94560; font-size: 14px; margin-top: 6px; }
    .editor-content label { font-size: 12px; color: #a09890; }

    .editor-content textarea,
    .editor-content input[type="text"] {
      width: 100%; background: #1c1714;
      border: 2px solid #3e3530; color: #e0dcd8;
      font-family: 'Galmuri11', monospace; font-size: 13px;
      padding: 8px; resize: vertical;
    }
    .editor-content input[type="number"],
    .editor-content select {
      width: 100%; background: #1c1714;
      border: 2px solid #3e3530; color: #e0dcd8;
      font-family: 'Galmuri11', monospace; font-size: 13px;
      padding: 6px 8px;
    }
    .editor-content input[type="range"] {
      width: 100%; accent-color: #e94560;
    }

    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn {
      font-family: 'Galmuri11', monospace; font-size: 12px;
      padding: 8px 12px; border: 3px solid; cursor: pointer; font-weight: bold;
    }
    .btn-primary { background: #DC2626; color: white; border-color: #991b1b; flex: 1; }
    .btn-primary:hover { background: #EF4444; }
    .btn-secondary { background: #1c1714; color: #e94560; border-color: #e94560; flex: 1; }
    .btn-ghost { background: #222; color: #aaa; border-color: #444; }
    .btn-success { background: #16a34a; color: white; border-color: #15803d; flex: 1; font-size: 14px; }
    .btn-success:hover { background: #22c55e; }
    .btn-danger { background: #DC2626; color: white; border-color: #991b1b; }
    .btn-sm { padding: 5px 8px; font-size: 11px; }

    .btn-record.recording { animation: recPulse 1s ease-in-out infinite; }
    @keyframes recPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    /* 슬라이드 목록 */
    .slide-list { display: flex; flex-direction: column; gap: 4px; max-height: 240px; overflow-y: auto; }
    .slide-item {
      padding: 8px 10px;
      background: #1c1714; border: 2px solid #3e3530;
      font-size: 11px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
    }
    .slide-item.active { border-color: #e94560; background: #2e2722; }
    .slide-item:hover { border-color: #a09890; }
    .slide-item .drag-handle {
      cursor: grab; color: #555; font-size: 14px; flex-shrink: 0; user-select: none;
    }
    .slide-item .slide-thumb {
      width: 28px; height: 28px; border: 2px solid #3e3530; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: #888;
    }
    .slide-item .slide-num {
      background: #3e3530; color: #a09890;
      padding: 2px 6px; font-size: 10px; flex-shrink: 0;
    }
    .slide-item.active .slide-num { background: #e94560; color: white; }
    .slide-item .slide-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .slide-item .slide-type { font-size: 9px; color: #666; flex-shrink: 0; }
    .slide-item .slide-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .slide-item .slide-actions button {
      background: none; border: 1px solid #3e3530; color: #a09890;
      font-size: 10px; padding: 2px 5px; cursor: pointer;
      font-family: 'Galmuri11', monospace;
    }
    .slide-item .slide-actions button:hover { border-color: #e94560; color: #e94560; }

    /* 이미지 업로드 */
    .image-upload-zone {
      border: 3px dashed #3e3530;
      padding: 20px; text-align: center;
      cursor: pointer; color: #666; font-size: 12px;
      transition: border-color 0.2s;
    }
    .image-upload-zone:hover { border-color: #e94560; color: #a09890; }
    .image-upload-zone.has-image {
      border-style: solid; border-color: #3e3530;
      padding: 8px;
    }
    .image-upload-zone img {
      max-width: 100%; max-height: 150px;
      object-fit: contain;
    }

    .color-row {
      display: flex; gap: 8px; align-items: center;
    }
    .color-row input[type="color"] {
      width: 36px; height: 30px; border: 2px solid #3e3530;
      background: #1c1714; cursor: pointer; padding: 2px;
    }

    .divider {
      border: none; border-top: 2px solid #3e3530; margin: 4px 0;
    }

    .status-bar {
      padding: 10px 20px;
      background: #1c1714;
      border-top: 3px solid #3e3530;
      font-size: 12px; color: #a09890;
      text-align: center;
    }
    .status-bar.recording { border-top-color: #DC2626; color: #EF4444; }

    /* Collapsible sections */
    .collapsible-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; padding: 6px 0; user-select: none;
    }
    .collapsible-header h3 { margin: 0; }
    .collapsible-header .toggle-icon { color: #666; font-size: 12px; }
    .collapsible-body { overflow: hidden; }
    .collapsible-body.collapsed { display: none; }

    /* Mini inline row */
    .inline-row { display: flex; gap: 6px; align-items: center; }
    .inline-row label { flex-shrink: 0; white-space: nowrap; }
    .inline-row input, .inline-row select { flex: 1; min-width: 0; }

    /* 전환 효과 */
    .transition-fade .slide-layer { transition: opacity 0.5s ease; }
    .transition-none .slide-layer { transition: none; }
    .transition-slide-up .slide-layer {
      transition: opacity 0.4s ease, transform 0.4s ease;
      transform: translateY(40px);
    }
    .transition-slide-up .slide-layer.active { transform: translateY(0); }

    /* Text animation classes */
    .anim-fade-in {
      animation: animFadeIn 0.8s ease forwards;
    }
    .anim-slide-up {
      animation: animSlideUp 0.6s ease forwards;
    }
    @keyframes animFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes animSlideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

    @keyframes brandShine { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* === Timeline bar === */
    .timeline-bar {
      height: 40px;
      background: #111;
      border-top: 3px solid #3e3530;
      display: flex;
      align-items: stretch;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .timeline-block {
      flex-shrink: 0;
      height: 100%;
      border-right: 1px solid #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #a09890;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .timeline-block:hover { filter: brightness(1.3); }
    .timeline-block.active { box-shadow: inset 0 -3px 0 #e94560; }
    .timeline-playhead {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      background: #e94560;
      z-index: 2;
      pointer-events: none;
      transition: left 0.3s linear;
    }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1c1714; }
    ::-webkit-scrollbar-thumb { background: #3e3530; }
    ::-webkit-scrollbar-thumb:hover { background: #e94560; }
  </style>
</head>
<body>

  <div class="main-area">
    <!-- 미리보기 영역 -->
    <div class="preview-area" id="previewArea">
      <div class="canvas-scaler" id="canvasScaler">
        <div class="video-canvas transition-fade" id="videoCanvas">
          <div class="video-header" id="videoHeader">
            <img class="logo" src="logo.png" alt="AntStreet">
            <div class="brand-name">AntStreet Report</div>
          </div>
          <div class="video-body" id="videoBody">
            <!-- 슬라이드 레이어들이 여기에 동적 생성 -->
          </div>
          <div class="fade-to-black-overlay" id="fadeOverlay"></div>
          <!-- footer/disclaimer/progress/indicator 제거됨 -->
        </div>
      </div>
    </div>

    <!-- 편집 패널 -->
    <div class="editor" id="editor">
      <div class="editor-header">
        <h2>AntStreet Video Editor</h2>
        <button class="btn btn-sm btn-ghost" onclick="toggleEditor()">숨기기(P)</button>
      </div>

      <div class="editor-tabs">
        <button class="editor-tab active" onclick="switchTab('slides')" id="tabSlides">슬라이드</button>
        <button class="editor-tab" onclick="switchTab('style')" id="tabStyle">스타일</button>
        <button class="editor-tab" onclick="switchTab('export')" id="tabExport">녹화/내보내기</button>
      </div>

      <div class="editor-content" id="editorContent">
        <!-- 탭 내용이 여기에 -->
      </div>

      <div class="status-bar" id="statusBar">준비 완료</div>
    </div>
  </div>

  <!-- Timeline bar -->
  <div class="timeline-bar" id="timelineBar"></div>

  <!-- Hidden inputs -->
  <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImage(event)">
  <input type="file" id="projectInput" accept=".json" style="display:none" onchange="handleProject(event)">
  <input type="file" id="bgmInput" accept="audio/mp3,audio/wav,audio/*" style="display:none" onchange="handleBGM(event)">
  <input type="file" id="importTextInput" accept=".txt" style="display:none" onchange="handleImportText(event)">

  <script>
    // ==========================================
    //  데이터
    // ==========================================
    const defaultSlideProps = {
      title: "새 슬라이드",
      body: "내용을 입력하세요",
      layout: "text-only",
      image: null,
      titleColor: "#e94560",
      bodyColor: "#e0dcd8",
      bgColor: "#1c1714",
      durationOverride: 0,
      titleFontSize: 60,
      bodyFontSize: 38,
      textAlign: "center",
      showHeader: true,
      animation: "typing",
      subtitle: "",
      subtitleColor: "#a09890"
    };

    function ensureSlideDefaults(s) {
      return Object.assign({}, defaultSlideProps, s);
    }

    let slides = [
      { title:"제목을 입력하세요", body:"", layout:"text-only", image:null }
    ].map(ensureSlideDefaults);

    let currentSlide = 0;
    let isPlaying = false;
    let animationId = null;
    let settings = {
      typeSpeed: 50,
      slidePause: 2000,
      soundType: 'mechanical',
      transition: 'fade',
      fadeToBlack: false,
      resolution: '1080x1920',
      videoBitrate: 8000000
    };

    // 테마 설정
    let theme = {
      frameBg: '#1c1714',       // 프레임 배경색
      headerBg: '#1c1714',      // 헤더 배경색
      headerBorder: '#e94560',  // 헤더 하단 테두리
      defaultTitleColor: '#e94560',  // 기본 제목 색
      defaultBodyColor: '#e0dcd8',   // 기본 본문 색
      defaultBgColor: '#1c1714',     // 기본 슬라이드 배경
      subtitleColor: '#a09890',      // 기본 자막 색
      brandFont: 'inter'             // 'inter' 또는 'pixel'
    };

    function applyTheme() {
      const canvas = document.getElementById('videoCanvas');
      const header = document.getElementById('videoHeader');
      canvas.style.background = theme.frameBg;
      header.style.background = theme.headerBg;
      header.style.borderBottomColor = theme.headerBorder;
      // 브랜드 폰트
      const brandEl = header.querySelector('.brand-name');
      if(brandEl) {
        brandEl.style.color = theme.headerBorder;
        if(theme.brandFont === 'pixel') {
          brandEl.style.fontFamily = "'Galmuri11', monospace";
          brandEl.style.letterSpacing = '0';
        } else {
          brandEl.style.fontFamily = "'Inter', Arial, sans-serif";
          brandEl.style.letterSpacing = '-0.03em';
        }
      }
      defaultSlideProps.titleColor = theme.defaultTitleColor;
      defaultSlideProps.bodyColor = theme.defaultBodyColor;
      defaultSlideProps.bgColor = theme.defaultBgColor;
      defaultSlideProps.subtitleColor = theme.subtitleColor;
      renderSlides();
      activateSlide(currentSlide);
    }

    function applyThemeToAll() {
      slides.forEach(s => {
        s.titleColor = theme.defaultTitleColor;
        s.bodyColor = theme.defaultBodyColor;
        s.bgColor = theme.defaultBgColor;
        s.subtitleColor = theme.subtitleColor;
      });
      applyTheme();
    }

    function resetTheme() {
      theme = {
        frameBg: '#1c1714', headerBg: '#1c1714', headerBorder: '#e94560',
        defaultTitleColor: '#e94560', defaultBodyColor: '#e0dcd8',
        defaultBgColor: '#1c1714', subtitleColor: '#a09890'
      };
      applyTheme();
    }

    const themePresets = {
      dark:     { frameBg:'#1c1714', headerBg:'#1c1714', headerBorder:'#e94560', defaultTitleColor:'#e94560', defaultBodyColor:'#e0dcd8', defaultBgColor:'#1c1714', subtitleColor:'#a09890' },
      light:    { frameBg:'#f5f0eb', headerBg:'#f5f0eb', headerBorder:'#991b1b', defaultTitleColor:'#991b1b', defaultBodyColor:'#2e2722', defaultBgColor:'#f5f0eb', subtitleColor:'#7a7068' },
      midnight: { frameBg:'#0f172a', headerBg:'#0f172a', headerBorder:'#60a5fa', defaultTitleColor:'#60a5fa', defaultBodyColor:'#e2e8f0', defaultBgColor:'#0f172a', subtitleColor:'#94a3b8' },
      forest:   { frameBg:'#14532d', headerBg:'#14532d', headerBorder:'#4ade80', defaultTitleColor:'#4ade80', defaultBodyColor:'#dcfce7', defaultBgColor:'#14532d', subtitleColor:'#86efac' },
      sunset:   { frameBg:'#431407', headerBg:'#431407', headerBorder:'#fb923c', defaultTitleColor:'#fb923c', defaultBodyColor:'#fed7aa', defaultBgColor:'#431407', subtitleColor:'#fdba74' },
      mono:     { frameBg:'#1a1a1a', headerBg:'#1a1a1a', headerBorder:'#a0a0a0', defaultTitleColor:'#ffffff', defaultBodyColor:'#c0c0c0', defaultBgColor:'#1a1a1a', subtitleColor:'#808080' }
    };

    function loadPreset(name) {
      const p = themePresets[name];
      if(!p) return;
      theme = Object.assign({}, p);
      applyThemeToAll();
    }

    // BGM state
    let bgmData = null; // base64 data URL
    let bgmFileName = '';
    let bgmVolume = 50;
    let bgmAudioEl = null;

    // ==========================================
    //  오디오
    // ==========================================
    let audioCtx = null;
    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }

    function playTypeSound() {
      if(settings.soundType==='none'||!audioCtx) return;
      const osc=audioCtx.createOscillator(), gain=audioCtx.createGain(), now=audioCtx.currentTime;
      osc.connect(gain); gain.connect(audioCtx.destination);
      if(settings.soundType==='mechanical'){
        osc.type='square'; osc.frequency.setValueAtTime(800+Math.random()*400,now);
        osc.frequency.exponentialRampToValueAtTime(200,now+0.03);
        gain.gain.setValueAtTime(0.15,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.05);
        osc.start(now); osc.stop(now+0.05);
      } else if(settings.soundType==='soft'){
        osc.type='sine'; osc.frequency.setValueAtTime(600+Math.random()*200,now);
        gain.gain.setValueAtTime(0.08,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.04);
        osc.start(now); osc.stop(now+0.04);
      } else if(settings.soundType==='retro'){
        osc.type='square'; osc.frequency.setValueAtTime(1200+Math.random()*600,now);
        osc.frequency.setValueAtTime(400+Math.random()*200,now+0.02);
        gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.06);
        osc.start(now); osc.stop(now+0.06);
      }
    }

    // BGM functions
    function startBGM() {
      if(!bgmData) return;
      stopBGM();
      bgmAudioEl = new Audio(bgmData);
      bgmAudioEl.loop = true;

      bgmAudioEl.play().catch(()=>{});

    function stopBGM() {
      if(bgmAudioEl) {

        bgmAudioEl.currentTime = 0;
        bgmAudioEl = null;

        setStatus('BGM 로드 완료: ' + bgmFileName, false);

    function activateSlide(index) {
      // Header show/hide
      const hdr = document.getElementById('videoHeader');
      const s = slides[index] || {};
      if(s.showHeader === false) hdr.classList.add('hidden-header');
      else hdr.classList.remove('hidden-header');

      });
      renderTimeline();

    // ==========================================
    //  텍스트 애니메이션
    // ==========================================
    function typeText(element, text, speed) {
      return new Promise(resolve => {
        if(!element){resolve();return;}
        element.innerHTML = '';
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        element.parentElement.appendChild(cursor);
        let i = 0;
        function tick() {
          if(!isPlaying){cursor.remove();resolve();return;}
          if(i < text.length) {
            if(text[i]==='\n') element.innerHTML += '<br>';
            else { element.innerHTML += text[i]; playTypeSound(); }
            i++;
            animationId = setTimeout(tick, speed + Math.random()*(speed*0.5));
          } else { cursor.remove(); resolve(); }
        }
        tick();
      });
    }

    function fadeInText(element, text) {
      return new Promise(resolve => {
        if(!element){resolve();return;}
        element.innerHTML = text.replace(/\n/g, '<br>');
        element.style.opacity = '0';
        element.classList.add('anim-fade-in');
        element.style.opacity = '';
        setTimeout(resolve, 800);
      });
    }

    function slideUpText(element, text) {
      return new Promise(resolve => {
        if(!element){resolve();return;}
        element.innerHTML = text.replace(/\n/g, '<br>');
        element.classList.add('anim-slide-up');
        setTimeout(resolve, 600);
      });
    }

    function instantText(element, text) {
      return new Promise(resolve => {
        if(!element){resolve();return;}
        element.innerHTML = text.replace(/\n/g, '<br>');
        resolve();
      });
    }

    function animateText(element, text, speed, animType) {
      if(animType === 'fade-in') return fadeInText(element, text);
      if(animType === 'slide-up') return slideUpText(element, text);
      if(animType === 'instant') return instantText(element, text);
      return typeText(element, text, speed); // typing (default)
    }

    function wait(ms) { return new Promise(r => { animationId = setTimeout(r, ms); }); }

    // Timing tracking
    let playStartTime = 0;
    let totalEstDuration = 0;

    function estimateSlideDuration(s) {
      s = ensureSlideDefaults(s);
      if(s.durationOverride > 0) return s.durationOverride;
      if(s.animation === 'typing') {
        const titleLen = (s.title || '').length;
        const bodyLen = (s.body || '').length;
        const titleTime = titleLen * settings.typeSpeed * 1.25;
        const bodyTime = bodyLen * settings.typeSpeed * 0.8 * 1.25;
        return 400 + titleTime + 300 + bodyTime + settings.slidePause;
      }
      return 400 + 800 + 300 + 600 + settings.slidePause;
    }

    function getTotalDuration() {
      return slides.reduce((acc, s) => acc + estimateSlideDuration(s), 0) + 2000;
    }

    async function playSlide(index) {
      const s = slides[index];

      // Fade to black transition
      if(settings.fadeToBlack && index > 0) {
        const overlay = document.getElementById('fadeOverlay');
        overlay.classList.add('active');
        await wait(400);
        activateSlide(index);
        await wait(100);
        overlay.classList.remove('active');
        await wait(400);
      } else {
        activateSlide(index);
      }

      const layer = document.getElementById(`slide-${index}`);
      if(!layer) return;

      const titleSpan = layer.querySelector('.slide-title .text');
      const bodySpan = layer.querySelector('.slide-body-text .text');
      if(titleSpan) titleSpan.innerHTML = '';
      if(bodySpan) bodySpan.innerHTML = '';

      const anim = s.animation || 'typing';

      // Duration override with simple wait
      if(s.durationOverride > 0 && anim !== 'typing') {
        await wait(200);
        if(titleSpan && s.title) await animateText(titleSpan, s.title, settings.typeSpeed, anim);
        await wait(200);
        if(bodySpan && s.body) await animateText(bodySpan, s.body, settings.typeSpeed * 0.8, anim);
        const elapsed = anim === 'typing' ? 0 : 1200;
        const remaining = Math.max(0, s.durationOverride - elapsed);
        await wait(remaining);
        return;
      }

      await wait(400);

      if(titleSpan && s.title) {
        await animateText(titleSpan, s.title, settings.typeSpeed, anim);
        await wait(300);
      }
      if(bodySpan && s.body) {
        await animateText(bodySpan, s.body, settings.typeSpeed * 0.8, anim);
      }
    }

    async function playAll() {
      initAudio();
      isPlaying = true;
      setStatus('재생 중...', false);
      startBGM();

      playStartTime = Date.now();
      totalEstDuration = getTotalDuration();

      for(let i=0; i<slides.length; i++) {
        if(!isPlaying) break;
        currentSlide = i;
        if(document.getElementById('tabSlides').classList.contains('active')) renderSlidesTab();
        await playSlide(i);
        if(i < slides.length-1 && isPlaying) await wait(slides[i].durationOverride > 0 ? 0 : settings.slidePause);
      }
      if(isPlaying) await wait(2000);
      isPlaying = false;
      stopBGM();
      setStatus('재생 완료', false);
    }

    function stopPlay() {
      isPlaying = false;
      if(animationId){clearTimeout(animationId);animationId=null;}
      stopBGM();
    }

    function resetCanvas() {
      stopPlay();
      document.querySelectorAll('.slide-title .text, .slide-body-text .text').forEach(el => el.innerHTML='');
      document.querySelectorAll('.cursor').forEach(el => el.remove());
      document.getElementById('fadeOverlay').classList.remove('active');
      activateSlide(currentSlide);
    }

    // ==========================================
    //  Timeline
    // ==========================================
    function renderTimeline() {
      const bar = document.getElementById('timelineBar');
      if(!bar) return;
      let html = '';
      const totalDur = getTotalDuration();
      slides.forEach((s, i) => {
        const dur = estimateSlideDuration(s);
        const pct = (dur / totalDur) * 100;
        const bg = s.bgColor || '#1c1714';
        const isActive = i === currentSlide;
        const layoutIcon = s.image ? (s.layout==='image-bg'?'BG':'IMG') : 'TXT';
        html += `<div class="timeline-block ${isActive?'active':''}" style="width:${pct}%;background:${bg};min-width:24px;" onclick="jumpToSlide(${i})" title="슬라이드 ${i+1}: ${s.title.replace(/\n/g,' ').substring(0,20)}"><span>${i+1}</span></div>`;
      });
      bar.innerHTML = html;
    }

    function jumpToSlide(i) {
      if(isPlaying) return;
      currentSlide = i;
      activateSlide(i);
      if(document.getElementById('tabSlides').classList.contains('active')) renderSlidesTab();
    }

    function moveSlide(i, dir) {

    function importSlidesFromText() {
      const text = prompt('여러 줄의 텍스트를 입력하세요.\n빈 줄로 슬라이드를 구분합니다.\n각 슬라이드의 첫 줄이 제목, 나머지가 본문이 됩니다.');
      if(!text) return;

      const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim());
      if(paragraphs.length === 0) return;

      const newSlides = paragraphs.map(p => {
        const lines = p.trim().split('\n');
        const title = lines[0] || '슬라이드';
        const body = lines.slice(1).join('\n') || '';
        return Object.assign({}, defaultSlideProps, { title, body });
      });

      slides = slides.concat(newSlides);
      currentSlide = slides.length - newSlides.length;
      renderSlides(); renderSlidesTab();
      setStatus(`${newSlides.length}개 슬라이드를 가져왔습니다`, false);

    // Load logo as base64 to avoid canvas taint (CORS/file:// issue)
    (function loadLogoAsBase64() {
      const c = document.createElement('canvas');

      function convertToBase64(srcImg) {
        try {

          const cx = c.getContext('2d');
          cx.imageSmoothingEnabled = false;
          cx.drawImage(srcImg, 0, 0, 128, 128);

    function canvasDrawHeader(ctx, w, time) {
      const headerH = 140;
      ctx.fillStyle = theme.headerBg;
      ctx.fillRect(0, 0, w, headerH);

      // Scanlines (tinted with header border color)
      const hbc = theme.headerBorder;
      const r = parseInt(hbc.slice(1,3),16), g = parseInt(hbc.slice(3,5),16), b = parseInt(hbc.slice(5,7),16);
      ctx.fillStyle = `rgba(${r},${g},${b},0.03)`;
      for(let y = 0; y < headerH; y += 4) ctx.fillRect(0, y+3, w, 1);

      // Border
      ctx.fillStyle = theme.headerBorder;
      ctx.fillRect(0, headerH-4, w, 4);

      // Logo
      if(logoImg) {
        const logoSize = 90;
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(logoImg, w/2 - logoSize - 40, (headerH-logoSize)/2, logoSize, logoSize);
        ctx.imageSmoothingEnabled = true;
      }

      // Brand text with animated gradient
      const brandFontFace = theme.brandFont === 'pixel' ? 'bold 48px Galmuri11, monospace' : '900 52px Inter, Arial, sans-serif';
      ctx.font = brandFontFace;
      ctx.textBaseline = 'middle';
      const brandX = w/2 + 10;
      ctx.fillStyle = theme.headerBorder;
      ctx.fillText('AntStreet Report', brandX, headerH/2);

      return headerH;
    }

    function canvasDrawSlide(ctx, w, h, slide, opts) {
      const s = ensureSlideDefaults(slide);

      // Background
      ctx.fillStyle = s.bgColor || '#1c1714';
      ctx.fillRect(0, 0, w, h);

      // Background image
      if(s.layout === 'image-bg' && s._imgEl) {
        ctx.save();
        ctx.globalAlpha = 0.3;
        const iw = s._imgEl.naturalWidth, ih = s._imgEl.naturalHeight;
        const scale = Math.max(w/iw, h/ih);
        const dw = iw*scale, dh = ih*scale;
        ctx.drawImage(s._imgEl, (w-dw)/2, (h-dh)/2, dw, dh);
        ctx.restore();
      }

      // Header
      const headerH = s.showHeader !== false ? canvasDrawHeader(ctx, w, opts.time) : 0;

      // Non-bg images
      let imgH = 0;
      let imgY = 0;
      if(s.image && s._imgEl && s.layout !== 'image-bg') {
        const maxImgW = Math.min(900, w - 140);
        const maxImgH = Math.min(700, (h - headerH) * 0.4);
        const iw = s._imgEl.naturalWidth, ih = s._imgEl.naturalHeight;
        const imgScale = Math.min(maxImgW/iw, maxImgH/ih, 1);
        const dw = iw * imgScale, dh = ih * imgScale;
        imgH = dh + 40;
        if(s.layout === 'image-top') {
          imgY = headerH + 40;
          ctx.strokeStyle = '#3e3530';
          ctx.lineWidth = 4;
          ctx.strokeRect(w/2 - dw/2, imgY, dw, dh);
          ctx.drawImage(s._imgEl, w/2 - dw/2, imgY, dw, dh);
        }
      }

      // Content area
      const contentTop = headerH + (s.layout === 'image-top' ? imgH : 0) + 50;
      const contentH = h - contentTop - 50 - (s.layout === 'image-center' ? imgH : 0);
      const centerX = w / 2;

      // Title
      const titleText = s.title || '';
      const bodyText = s.body || '';
      const dispTitle = opts.titleChars >= 0 ? titleText.substring(0, opts.titleChars) : titleText;
      const dispBody = opts.bodyChars >= 0 ? bodyText.substring(0, opts.bodyChars) : bodyText;

      // Measure title
      ctx.font = `bold ${s.titleFontSize}px Galmuri11, monospace`;
      ctx.textBaseline = 'top';
      const titleLineH = s.titleFontSize * 1.4;
      const titleLines = dispTitle ? dispTitle.split('\n') : [];

      ctx.font = `${s.bodyFontSize}px Galmuri11, monospace`;
      const bodyLineH = s.bodyFontSize * 1.7;
      const bodyLines = dispBody ? dispBody.split('\n') : [];

      const titleH = titleLines.length * titleLineH;
      const bodyH = dispBody ? bodyLines.length * bodyLineH : 0;
      const gap = 40;
      const totalH = titleH + (dispBody ? gap + bodyH : 0);

      let y = contentTop + (contentH - totalH) / 2;

      // Draw title
      if(dispTitle) {
        ctx.save();
        ctx.globalAlpha = opts.titleOpacity !== undefined ? opts.titleOpacity : 1;
        ctx.font = `bold ${s.titleFontSize}px Galmuri11, monospace`;
        ctx.textBaseline = 'top';
        for(let i = 0; i < titleLines.length; i++) {
          const line = titleLines[i];
          const m = ctx.measureText(line);
          let lx = s.textAlign === 'center' ? centerX - m.width/2 : s.textAlign === 'right' ? w - 70 - m.width : 70;
          ctx.fillStyle = '#0d0a08';
          ctx.fillText(line, lx+3, y + i*titleLineH + 3 + (opts.titleOffsetY||0));
          ctx.fillStyle = s.titleColor;
          ctx.fillText(line, lx, y + i*titleLineH + (opts.titleOffsetY||0));
        }
        if(opts.showCursor && opts.cursorTarget === 'title' && opts.cursorVisible) {
          const last = titleLines[titleLines.length-1] || '';
          const lm = ctx.measureText(last);
          let cx = s.textAlign === 'center' ? centerX + lm.width/2 + 4 : 70 + lm.width + 4;
          ctx.fillStyle = s.titleColor;
          ctx.fillRect(cx, y + (titleLines.length-1)*titleLineH, 4, s.titleFontSize);
        }
        ctx.restore();
        y += titleH + gap;
      }

      // Draw body
      if(dispBody) {
        ctx.save();
        ctx.globalAlpha = opts.bodyOpacity !== undefined ? opts.bodyOpacity : 1;
        ctx.font = `${s.bodyFontSize}px Galmuri11, monospace`;
        ctx.textBaseline = 'top';
        for(let i = 0; i < bodyLines.length; i++) {
          const line = bodyLines[i];
          const m = ctx.measureText(line);
          let lx = s.textAlign === 'center' ? centerX - m.width/2 : s.textAlign === 'right' ? w - 70 - m.width : 70;
          ctx.fillStyle = '#0d0a08';
          ctx.fillText(line, lx+2, y + i*bodyLineH + 2 + (opts.bodyOffsetY||0));
          ctx.fillStyle = s.bodyColor;
          ctx.fillText(line, lx, y + i*bodyLineH + (opts.bodyOffsetY||0));
        }
        if(opts.showCursor && opts.cursorTarget === 'body' && opts.cursorVisible) {
          const last = bodyLines[bodyLines.length-1] || '';
          const lm = ctx.measureText(last);
          let cx = s.textAlign === 'center' ? centerX + lm.width/2 + 3 : 70 + lm.width + 3;
          ctx.fillStyle = s.bodyColor;
          ctx.fillRect(cx, y + (bodyLines.length-1)*bodyLineH, 3, s.bodyFontSize);
        }
        ctx.restore();
      }

      // Image center/bottom
      if(s.image && s._imgEl && s.layout === 'image-center') {
        const maxImgW = Math.min(900, w - 140);
        const maxImgH = Math.min(700, (h - headerH) * 0.4);
        const iw = s._imgEl.naturalWidth, ih = s._imgEl.naturalHeight;
        const imgScale = Math.min(maxImgW/iw, maxImgH/ih, 1);
        const dw = iw * imgScale, dh = ih * imgScale;
        const iy = h - 50 - dh;
        ctx.strokeStyle = '#3e3530';
        ctx.lineWidth = 4;
        ctx.strokeRect(w/2 - dw/2, iy, dw, dh);
        ctx.drawImage(s._imgEl, w/2 - dw/2, iy, dw, dh);
      }

      // Subtitle
      if(s.subtitle) {
        ctx.save();
        ctx.font = '28px Galmuri11, monospace';
        ctx.textBaseline = 'bottom';
        ctx.textAlign = 'center';
        const subM = ctx.measureText(s.subtitle);
        ctx.fillStyle = s.subtitleColor || '#a09890';
        ctx.fillText(s.subtitle, w/2, h - 30);
        ctx.restore();
      }

      // Fade to black
      if(opts.fadeToBlack > 0) {
        ctx.fillStyle = `rgba(0,0,0,${opts.fadeToBlack})`;
        ctx.fillRect(0, 0, w, h);
      }
    }

    function animateFrames(ctx, canvas, res, durationMs, drawFn) {
      return new Promise(resolve => {
        if(durationMs <= 0) { resolve(); return; }
        const fps = settings.videoBitrate >= 15000000 ? 60 : 30;
        const frameInterval = 1000 / fps;
        const totalFrames = Math.max(1, Math.ceil(durationMs / frameInterval));
        let frameIdx = 0;
        const startTime = performance.now();

        function frame() {
          if(!isExporting) { resolve(); return; }
          const t = Math.min(1, frameIdx / totalFrames);
          const time = startTime + frameIdx * frameInterval;
          drawFn(t, time);
          frameIdx++;
          if(frameIdx <= totalFrames) {
            setTimeout(frame, frameInterval);
          } else {
            resolve();
          }
        }
        frame();
      });
    }

    async function exportVideo() {
      if(isExporting) return;
      isExporting = true;
      try { await _doExport(); } catch(err) {
        console.error('Export error:', err);
        setStatus('영상 생성 오류: ' + err.message, false);
        isExporting = false;
      }
    }
    async function _doExport() {

      // Load fonts
      try {
        await document.fonts.load('bold 60px Galmuri11');
        await document.fonts.load('900 52px Inter');
      } catch(e) {}
      await new Promise(r => setTimeout(r, 300));

      // Pre-load slide images
      for(let i = 0; i < slides.length; i++) {
        const s = ensureSlideDefaults(slides[i]);
        slides[i] = s;
        if(s.image) {
          try {
            const img = new Image();
            img.src = s.image;
            await new Promise((resolve, reject) => {
              img.onload = resolve;
              img.onerror = resolve;
            });
            s._imgEl = img;
          } catch(e) { s._imgEl = null; }
        }
      }

      const res = getCanvasRes();
      const offCanvas = document.createElement('canvas');
      offCanvas.width = res.w;
      offCanvas.height = res.h;
      offCanvas.style.cssText = 'position:fixed;top:-9999px;left:-9999px;pointer-events:none;';
      document.body.appendChild(offCanvas);
      const ctx = offCanvas.getContext('2d');

      // Draw initial frame so captureStream has content
      ctx.fillStyle = theme.frameBg;
      ctx.fillRect(0, 0, res.w, res.h);
      canvasDrawHeader(ctx, res.w, 0);

      const fps = settings.videoBitrate >= 15000000 ? 60 : 30;
      const videoStream = offCanvas.captureStream(fps);

      // Audio context for export
      const expAudioCtx = new AudioContext();
      const expAudioDest = expAudioCtx.createMediaStreamDestination();

      function expPlayTypeSound() {
        if(settings.soundType==='none') return;
        const osc = expAudioCtx.createOscillator();
        const gain = expAudioCtx.createGain();
        const now = expAudioCtx.currentTime;
        osc.connect(gain); gain.connect(expAudioDest);
        if(settings.soundType==='mechanical'){
          osc.type='square';osc.frequency.setValueAtTime(800+Math.random()*400,now);
          osc.frequency.exponentialRampToValueAtTime(200,now+0.03);
          gain.gain.setValueAtTime(0.15,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.05);
          osc.start(now);osc.stop(now+0.05);
        } else if(settings.soundType==='soft'){
          osc.type='sine';osc.frequency.setValueAtTime(600+Math.random()*200,now);
          gain.gain.setValueAtTime(0.08,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.04);
          osc.start(now);osc.stop(now+0.04);
        } else if(settings.soundType==='retro'){
          osc.type='square';osc.frequency.setValueAtTime(1200+Math.random()*600,now);
          osc.frequency.setValueAtTime(400+Math.random()*200,now+0.02);
          gain.gain.setValueAtTime(0.12,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.06);
          osc.start(now);osc.stop(now+0.06);
        }
      }

      // BGM for export
      let expBgmSource = null;
      if(bgmData) {
        try {
          const resp = await fetch(bgmData);
          const arrBuf = await resp.arrayBuffer();
          const audioBuf = await expAudioCtx.decodeAudioData(arrBuf);
          expBgmSource = expAudioCtx.createBufferSource();
          expBgmSource.buffer = audioBuf;
          expBgmSource.loop = true;
          const gainNode = expAudioCtx.createGain();
          gainNode.gain.value = bgmVolume / 100;
          expBgmSource.connect(gainNode);
          gainNode.connect(expAudioDest);
        } catch(e) { console.warn('BGM load failed:', e); }
      }

      // Merge streams
      const merged = new MediaStream([
        ...videoStream.getVideoTracks(),
        ...expAudioDest.stream.getAudioTracks()
      ]);

      let mimeType = 'video/webm;codecs=vp9,opus';
      if(!MediaRecorder.isTypeSupported(mimeType)) {
        mimeType = 'video/webm;codecs=vp8,opus';
        if(!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
      }

      const recorder = new MediaRecorder(merged, {
        mimeType,
        videoBitsPerSecond: settings.videoBitrate,
        audioBitsPerSecond: settings.videoBitrate >= 15000000 ? 256000 : 128000
      });

      const chunks = [];
      recorder.ondataavailable = e => {
        if(e.data && e.data.size > 0) chunks.push(e.data);
      };

      const exportDone = new Promise(resolve => {
        recorder.onstop = () => {
          setTimeout(() => {
            if(offCanvas.parentNode) offCanvas.parentNode.removeChild(offCanvas);
            const blob = new Blob(chunks, {type: 'video/webm'});
            console.log('Export chunks:', chunks.length, 'blob size:', blob.size);
            if(chunks.length === 0) {
              setStatus('영상 생성 실패: 데이터 없음 (chunks=0)', false);
            } else {
              const a = document.createElement('a');
              a.href = URL.createObjectURL(blob);
              a.download = `AntStreet_${new Date().toISOString().slice(0,10)}.webm`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              setTimeout(() => URL.revokeObjectURL(a.href), 3000);
              setStatus(`다운로드 완료! (${(blob.size/1024/1024).toFixed(1)}MB)`, false);
            }
            isExporting = false;
            if(expBgmSource) try { expBgmSource.stop(); } catch(e) {}
            expAudioCtx.close();
            slides.forEach(s => { delete s._imgEl; });
            resolve();
          }, 500);
        };
      });

      recorder.start(500);
      if(expBgmSource) expBgmSource.start();
      setStatus('영상 생성 중... (탭을 전환하지 마세요)', true);

      // Wait for recorder to stabilize
      await new Promise(r => setTimeout(r, 500));

      // Render loop
      for(let si = 0; si < slides.length; si++) {
        if(!isExporting) break;
        const s = ensureSlideDefaults(slides[si]);
        setStatus(`영상 생성 중... ${si+1}/${slides.length} 슬라이드`, true);

        // Fade to black transition (between slides)
        if(settings.fadeToBlack && si > 0) {
          const prevS = ensureSlideDefaults(slides[si-1]);
          await animateFrames(ctx, offCanvas, res, 400, (t, time) => {
            canvasDrawSlide(ctx, res.w, res.h, prevS, { time, titleChars:-1, bodyChars:-1, titleOpacity:1, bodyOpacity:1, fadeToBlack: t });
          });
          await animateFrames(ctx, offCanvas, res, 100, (t, time) => {
            canvasDrawSlide(ctx, res.w, res.h, s, { time, titleChars:0, bodyChars:0, fadeToBlack: 1 });
          });
          await animateFrames(ctx, offCanvas, res, 400, (t, time) => {
            canvasDrawSlide(ctx, res.w, res.h, s, { time, titleChars:0, bodyChars:0, fadeToBlack: 1-t });
          });
        }

        // Initial pause
        await animateFrames(ctx, offCanvas, res, 400, (t, time) => {
          canvasDrawSlide(ctx, res.w, res.h, s, { time, titleChars:0, bodyChars:0 });
        });

        const anim = s.animation || 'typing';
        const titleLen = (s.title||'').length;
        const bodyLen = (s.body||'').length;

        if(anim === 'typing') {
          // Type title
          const titleDuration = titleLen * settings.typeSpeed * 1.25;
          let lastTitleChar = 0;
          await animateFrames(ctx, offCanvas, res, titleDuration || 1, (t, time) => {
            const chars = Math.floor(t * titleLen);
            if(chars > lastTitleChar) { for(let c = lastTitleChar; c < chars; c++) expPlayTypeSound(); lastTitleChar = chars; }
            const cursorVis = Math.floor(time / 300) % 2 === 0;
            canvasDrawSlide(ctx, res.w, res.h, s, { time, titleChars: chars, bodyChars: 0, showCursor: true, cursorTarget:'title', cursorVisible: cursorVis });
          });

          // Pause between title and body
          await animateFrames(ctx, offCanvas, res, 300, (t, time) => {
            canvasDrawSlide(ctx, res.w, res.h, s, { time, titleChars: titleLen, bodyChars: 0 });
          });

          // Type body
          if(bodyLen > 0) {
            const bodyDuration = bodyLen * settings.typeSpeed * 0.8 * 1.25;
            let lastBodyChar = 0;
            await animateFrames(ctx, offCanvas, res, bodyDuration || 1, (t, time) => {
              const chars = Math.floor(t * bodyLen);
              if(chars > lastBodyChar) { for(let c = lastBodyChar; c < chars; c++) expPlayTypeSound(); lastBodyChar = chars; }
              const cursorVis = Math.floor(time / 300) % 2 === 0;
              canvasDrawSlide(ctx, res.w, res.h, s, { time, titleChars: titleLen, bodyChars: chars, showCursor: true, cursorTarget:'body', cursorVisible: cursorVis });
            });
          }
        } else if(anim === 'fade-in') {
          await animateFrames(ctx, offCanvas, res, 800, (t, time) => {
            canvasDrawSlide(ctx, res.w, res.h, s, { time, titleChars: -1, bodyChars: -1, titleOpacity: t, bodyOpacity: 0 });
          });
          if(bodyLen > 0) {
            await animateFrames(ctx, offCanvas, res, 800, (t, time) => {
              canvasDrawSlide(ctx, res.w, res.h, s, { time, titleChars: -1, bodyChars: -1, titleOpacity: 1, bodyOpacity: t });
            });
          }
        } else if(anim === 'slide-up') {
          await animateFrames(ctx, offCanvas, res, 600, (t, time) => {
            const ease = 1 - Math.pow(1-t, 3);
            canvasDrawSlide(ctx, res.w, res.h, s, { time, titleChars: -1, bodyChars: -1, titleOpacity: ease, bodyOpacity: 0, titleOffsetY: 40*(1-ease) });
          });
          if(bodyLen > 0) {
            await animateFrames(ctx, offCanvas, res, 600, (t, time) => {
              const ease = 1 - Math.pow(1-t, 3);
              canvasDrawSlide(ctx, res.w, res.h, s, { time, titleChars: -1, bodyChars: -1, titleOpacity: 1, bodyOpacity: ease, bodyOffsetY: 40*(1-ease) });
            });
          }
        } else { // instant
          await animateFrames(ctx, offCanvas, res, 100, (t, time) => {
            canvasDrawSlide(ctx, res.w, res.h, s, { time, titleChars: -1, bodyChars: -1 });
          });
        }

        // Hold / slide pause
        const holdDuration = s.durationOverride > 0 ? s.durationOverride : settings.slidePause;
        await animateFrames(ctx, offCanvas, res, holdDuration, (t, time) => {
          canvasDrawSlide(ctx, res.w, res.h, s, { time, titleChars: -1, bodyChars: -1 });
        });
      }

      // Final hold
      if(isExporting && slides.length > 0) {
        await animateFrames(ctx, offCanvas, res, 2000, (t, time) => {
          const lastS = ensureSlideDefaults(slides[slides.length-1]);
          canvasDrawSlide(ctx, res.w, res.h, lastS, { time, titleChars: -1, bodyChars: -1 });
        });
      }

      // Stop and wait for file to be ready
      if(recorder.state !== 'inactive') recorder.stop();
      await exportDone;
    }

    function cancelExport() {
      isExporting = false;
      setStatus('영상 생성 취소됨', false);
    }

    // ==========================================
    //  녹화 (팝업 윈도우 방식 - 대안)
    // ==========================================
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordPopup = null;

    function setStatus(text, isRec) {
      const bar = document.getElementById('statusBar');
      if(!bar) return;
      bar.textContent = text;
      bar.className = 'status-bar' + (isRec?' recording':'');
    }

    function buildPopupHTML() {
      const res = getCanvasRes();
      const popupCSS = `
        @font-face { font-family:'Galmuri11'; src:url('https://cdn.jsdelivr.net/npm/galmuri/dist/Galmuri11.woff2') format('woff2'); font-weight:normal; }
        @font-face { font-family:'Galmuri11'; src:url('https://cdn.jsdelivr.net/npm/galmuri/dist/Galmuri11-Bold.woff2') format('woff2'); font-weight:bold; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#000;margin:0;overflow:hidden;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh;}
        .scale-wrap{transform-origin:center center;}
        .video-canvas{width:${res.w}px;height:${res.h}px;background:#1c1714;display:flex;flex-direction:column;position:relative;overflow:hidden;}
        .video-header{height:140px;background:#1c1714;border-bottom:4px solid #e94560;display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0;position:relative;}
        .video-header.hidden-header{display:none;}
        .video-header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(233,69,96,0.03) 3px,rgba(233,69,96,0.03) 4px);}
        .video-header .logo{width:90px;height:90px;image-rendering:pixelated;position:relative;z-index:1;}
        .video-header .brand-name{font-family:'Inter',Arial,sans-serif;font-weight:900;font-size:46px;letter-spacing:-0.03em;color:#e94560;position:relative;z-index:1;}
        .video-body{flex:1;position:relative;overflow:hidden;}
        .slide-layer{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 70px;gap:40px;opacity:0;transition:opacity 0.5s ease;}
        .slide-layer.active{opacity:1;}
        .slide-layer.layout-image-top{justify-content:flex-start;padding-top:40px;}
        .slide-layer.layout-image-bg{padding:0;}
        .slide-title{font-family:'Galmuri11',monospace;font-weight:bold;font-size:60px;color:#e94560;text-align:center;line-height:1.4;text-shadow:3px 3px 0px #0d0a08;width:100%;}
        .slide-title .cursor{display:inline-block;width:4px;height:60px;background:#e94560;margin-left:4px;animation:blink 0.6s step-end infinite;vertical-align:middle;}
        .slide-body-text{font-family:'Galmuri11',monospace;font-size:38px;color:#e0dcd8;text-align:center;line-height:1.7;width:100%;}
        .slide-body-text .cursor{display:inline-block;width:3px;height:38px;background:#e0dcd8;margin-left:3px;animation:blink 0.6s step-end infinite;vertical-align:middle;}
        .slide-subtitle{font-family:'Galmuri11',monospace;font-size:28px;color:#a09890;text-align:center;line-height:1.5;position:absolute;bottom:30px;left:50px;right:50px;z-index:5;}
        .slide-image{max-width:900px;max-height:700px;object-fit:contain;border:4px solid #3e3530;}
        .slide-image-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.3;}
        .slide-image-bg+.slide-content-over{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:50px 70px;gap:40px;}
        .fade-to-black-overlay{position:absolute;inset:0;background:#000;opacity:0;z-index:8;pointer-events:none;transition:opacity 0.4s ease;}
        .fade-to-black-overlay.active{opacity:1;}
        .anim-fade-in{animation:animFadeIn 0.8s ease forwards;}
        .anim-slide-up{animation:animSlideUp 0.6s ease forwards;}
        @keyframes animFadeIn{from{opacity:0}to{opacity:1}}
        @keyframes animSlideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
        @keyframes brandShine{0%{background-position:100% 0}100%{background-position:-100% 0}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
      `;

      let slidesHTML = '';
      slides.forEach((s, i) => {
        s = ensureSlideDefaults(s);
        const titleStyle = `color:${s.titleColor};font-size:${s.titleFontSize}px;text-align:${s.textAlign};`;
        const bodyStyle = `color:${s.bodyColor};font-size:${s.bodyFontSize}px;text-align:${s.textAlign};`;
        let inner = '';
        if(s.layout === 'image-bg' && s.image) {
          inner = `<img class="slide-image-bg" src="${s.image}"><div class="slide-content-over"><div class="slide-title" style="${titleStyle}"><span class="text"></span></div><div class="slide-body-text" style="${bodyStyle}"><span class="text"></span></div></div>`;
        } else if((s.layout === 'image-top' || s.layout === 'image-center') && s.image) {
          const img = `<img class="slide-image" src="${s.image}">`;
          const txt = `<div class="slide-title" style="${titleStyle}"><span class="text"></span></div><div class="slide-body-text" style="${bodyStyle}"><span class="text"></span></div>`;
          inner = s.layout==='image-top' ? img+txt : txt+img;
        } else {
          inner = `<div class="slide-title" style="${titleStyle}"><span class="text"></span></div><div class="slide-body-text" style="${bodyStyle}"><span class="text"></span></div>`;
        }
        if(s.subtitle) {
          inner += `<div class="slide-subtitle" style="color:${s.subtitleColor||'#a09890'}">${s.subtitle}</div>`;
        }
        slidesHTML += `<div class="slide-layer layout-${s.layout}${i===0?' active':''}" id="slide-${i}" style="background:${s.bgColor||'#1c1714'}">${inner}</div>`;
      });

      const logoSrc = new URL('logo.png', window.location.href).href;

      // Check first slide header visibility
      const firstSlideHeader = slides[0]?.showHeader !== false ? '' : ' hidden-header';

      // BGM audio tag
      const bgmTag = bgmData ? `<audio id="bgmAudio" src="${bgmData}" loop preload="auto"></audio>` : '';

      return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Recording</title><style>${popupCSS}</style></head><body>
        ${bgmTag}
        <div class="scale-wrap" id="scaleWrap">
          <div class="video-canvas" id="videoCanvas">
            <div class="video-header${firstSlideHeader}" id="videoHeader">
              <img class="logo" src="${logoSrc}" alt="AntStreet">
              <div class="brand-name">AntStreet Report</div>
            </div>
            <div class="video-body" id="videoBody">${slidesHTML}</div>
            <div class="fade-to-black-overlay" id="fadeOverlay"></div>
          </div>
        </div>
        <script>
          // 화면에 맞게 캔버스 자동 축소
          function fitToScreen() {
            const wrap = document.getElementById('scaleWrap');
            const cw = ${res.w}, ch = ${res.h};
            const sw = window.innerWidth, sh = window.innerHeight;
            const scale = Math.min(sw / cw, sh / ch);
            wrap.style.transform = 'scale(' + scale + ')';
          }
          fitToScreen();
          window.addEventListener('resize', fitToScreen);
          const slides = ${JSON.stringify(slides)};
          const settings = ${JSON.stringify(settings)};
          const bgmVolume = ${bgmVolume};
          let isPlaying = true;
          let animationId = null;

          // BGM
          const bgmEl = document.getElementById('bgmAudio');
          if(bgmEl) { bgmEl.volume = bgmVolume / 100; }

          // Audio
          let audioCtx = new (window.AudioContext||window.webkitAudioContext)();
          function playTypeSound(){
            if(settings.soundType==='none') return;
            const osc=audioCtx.createOscillator(),gain=audioCtx.createGain(),now=audioCtx.currentTime;
            osc.connect(gain);gain.connect(audioCtx.destination);
            if(settings.soundType==='mechanical'){osc.type='square';osc.frequency.setValueAtTime(800+Math.random()*400,now);osc.frequency.exponentialRampToValueAtTime(200,now+0.03);gain.gain.setValueAtTime(0.15,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.05);osc.start(now);osc.stop(now+0.05);}
            else if(settings.soundType==='soft'){osc.type='sine';osc.frequency.setValueAtTime(600+Math.random()*200,now);gain.gain.setValueAtTime(0.08,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.04);osc.start(now);osc.stop(now+0.04);}
            else if(settings.soundType==='retro'){osc.type='square';osc.frequency.setValueAtTime(1200+Math.random()*600,now);osc.frequency.setValueAtTime(400+Math.random()*200,now+0.02);gain.gain.setValueAtTime(0.12,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.06);osc.start(now);osc.stop(now+0.06);}
          }

          function wait(ms){return new Promise(r=>{animationId=setTimeout(r,ms);});}

          function typeText(el,text,speed){
            return new Promise(resolve=>{
              if(!el){resolve();return;}
              el.innerHTML='';
              const cursor=document.createElement('span');cursor.className='cursor';
              el.parentElement.appendChild(cursor);
              let i=0;
              function tick(){
                if(!isPlaying){cursor.remove();resolve();return;}
                if(i<text.length){
                  if(text[i]==='\\n')el.innerHTML+='<br>';
                  else{el.innerHTML+=text[i];playTypeSound();}
                  i++;animationId=setTimeout(tick,speed+Math.random()*(speed*0.5));
                }else{cursor.remove();resolve();}
              }
              tick();
            });
          }

          function fadeInText(el,text){return new Promise(r=>{if(!el){r();return;}el.innerHTML=text.replace(/\\n/g,'<br>');el.style.opacity='0';el.classList.add('anim-fade-in');el.style.opacity='';setTimeout(r,800);});}
          function slideUpText(el,text){return new Promise(r=>{if(!el){r();return;}el.innerHTML=text.replace(/\\n/g,'<br>');el.classList.add('anim-slide-up');setTimeout(r,600);});}
          function instantText(el,text){return new Promise(r=>{if(!el){r();return;}el.innerHTML=text.replace(/\\n/g,'<br>');r();});}

          function animateText(el,text,speed,animType){
            if(animType==='fade-in')return fadeInText(el,text);
            if(animType==='slide-up')return slideUpText(el,text);
            if(animType==='instant')return instantText(el,text);
            return typeText(el,text,speed);
          }

          function activateSlide(idx){
            const hdr=document.getElementById('videoHeader');
            const s=slides[idx]||{};
            if(s.showHeader===false)hdr.classList.add('hidden-header');
            else hdr.classList.remove('hidden-header');
            document.querySelectorAll('.slide-layer').forEach((el,i)=>el.classList.toggle('active',i===idx));
          }

          // Timing
          let playStartTime=0,totalEstDuration=0;
          function estimateSlideDuration(s){
            if(s.durationOverride>0)return s.durationOverride;
            if((s.animation||'typing')==='typing'){
              const tl=(s.title||'').length,bl=(s.body||'').length;
              return 400+tl*settings.typeSpeed*1.25+300+bl*settings.typeSpeed*0.8*1.25+settings.slidePause;
            }
            return 400+800+300+600+settings.slidePause;
          }
          function getTotalDuration(){return slides.reduce((a,s)=>a+estimateSlideDuration(s),0)+2000;}

          async function playSlide(idx){
            const s=slides[idx];
            if(settings.fadeToBlack&&idx>0){
              const ov=document.getElementById('fadeOverlay');
              ov.classList.add('active');await wait(400);
              activateSlide(idx);await wait(100);
              ov.classList.remove('active');await wait(400);
            }else{activateSlide(idx);}
            const layer=document.getElementById('slide-'+idx);if(!layer)return;
            const ts=layer.querySelector('.slide-title .text');
            const bs=layer.querySelector('.slide-body-text .text');
            if(ts)ts.innerHTML='';if(bs)bs.innerHTML='';
            const anim=s.animation||'typing';
            if(s.durationOverride>0&&anim!=='typing'){
              await wait(200);
              if(ts&&s.title)await animateText(ts,s.title,settings.typeSpeed,anim);
              await wait(200);
              if(bs&&s.body)await animateText(bs,s.body,settings.typeSpeed*0.8,anim);
              const remaining=Math.max(0,s.durationOverride-1200);
              await wait(remaining);return;
            }
            await wait(400);
            if(ts&&s.title){await animateText(ts,s.title,settings.typeSpeed,anim);await wait(300);}
            if(bs&&s.body)await animateText(bs,s.body,settings.typeSpeed*0.8,anim);
          }

          async function playAll(){
            window.opener.postMessage({type:'popup-ready'},'*');
            await wait(1000);

            if(bgmEl){bgmEl.play().catch(()=>{});}

            playStartTime=Date.now();
            totalEstDuration=getTotalDuration();

            for(let i=0;i<slides.length;i++){
              if(!isPlaying)break;
              await playSlide(i);
              if(i<slides.length-1&&isPlaying)await wait(slides[i].durationOverride>0?0:settings.slidePause);
            }
            if(isPlaying)await wait(2500);
            if(bgmEl){bgmEl.pause();}
            window.opener.postMessage({type:'playback-done'},'*');
          }

          document.fonts.ready.then(()=>{ setTimeout(playAll, 500); });
        <\/script>
      </body></html>`;
    }

    async function startRecord() {
      try {
        setStatus('팝업 윈도우 열기...', false);

        const res = getCanvasRes();
        // 화면 크기에 맞춰 팝업 열기 (캔버스는 내부에서 자동 축소됨)
        const popupWidth = Math.min(res.w, screen.availWidth - 50);
        const popupHeight = Math.min(res.h, screen.availHeight - 80);
        const left = Math.max(0, (screen.availWidth - popupWidth) / 2);
        const top = Math.max(0, (screen.availHeight - popupHeight) / 2);

        recordPopup = window.open('', 'AntStreet_Record',
          `width=${popupWidth},height=${popupHeight},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no,scrollbars=no,resizable=yes`
        );

        if(!recordPopup) {
          setStatus('팝업이 차단되었습니다. 팝업 허용 후 다시 시도하세요.', false);
          return;
        }

        recordPopup.document.open();
        recordPopup.document.write(buildPopupHTML());
        recordPopup.document.close();

        setStatus('팝업에서 화면 공유를 선택하세요...', false);

        await new Promise((resolve) => {
          const handler = (e) => {
            if(e.data?.type === 'popup-ready') {
              window.removeEventListener('message', handler);
              resolve();
            }
          };
          window.addEventListener('message', handler);
          setTimeout(() => { window.removeEventListener('message', handler); resolve(); }, 10000);
        });

        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: { displaySurface: 'window', width: { ideal: res.w }, height: { ideal: res.h }, frameRate: { ideal: 30 } },
          audio: true
        });

        recordedChunks = [];

        let mimeType = 'video/webm;codecs=vp9';
        if(!MediaRecorder.isTypeSupported(mimeType)) {
          mimeType = 'video/webm;codecs=vp8';
          if(!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
        }

        mediaRecorder = new MediaRecorder(stream, {
          mimeType: mimeType,
          videoBitsPerSecond: settings.videoBitrate
        });

        mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };

        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());

          const blob = new Blob(recordedChunks, { type: 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `AntStreet_${new Date().toISOString().slice(0,10)}.webm`;
          a.click();
          URL.revokeObjectURL(url);

          setStatus(`다운로드 완료! (${(blob.size/1024/1024).toFixed(1)}MB)`, false);
        };

        stream.getVideoTracks()[0].onended = () => {
          if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        };

        mediaRecorder.start();
        setStatus('🔴 녹화 중... 팝업 창의 재생이 끝나면 자동 저장됩니다', true);

        await new Promise((resolve) => {
          const handler = (e) => {
            if(e.data?.type === 'playback-done') {
              window.removeEventListener('message', handler);
              resolve();
            }
          };
          window.addEventListener('message', handler);
          setTimeout(() => { window.removeEventListener('message', handler); resolve(); }, 300000);
        });

        await new Promise(r => setTimeout(r, 1000));
        if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();

        if(recordPopup && !recordPopup.closed) recordPopup.close();

      } catch(err) {
        if(recordPopup && !recordPopup.closed) recordPopup.close();
        setStatus('취소됨: ' + err.message, false);
      }
    }

    function stopRecord() {
      isPlaying = false;
      if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      if(recordPopup && !recordPopup.closed) recordPopup.close();
    }

    // ==========================================
    //  프로젝트 저장/불러오기
    // ==========================================
    function saveProject() {
      const data = JSON.stringify({
        slides,
        settings,
        theme,
        bgmData,
        bgmFileName,
        bgmVolume
      }, null, 2);
      const blob = new Blob([data], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `AntStreet_Project_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      setStatus('프로젝트 저장 완료', false);
    }

    function loadProject() { document.getElementById('projectInput').click(); }

    function handleProject(e) {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if(data.slides) slides = data.slides.map(ensureSlideDefaults);
          if(data.settings) Object.assign(settings, data.settings);
          if(data.bgmData !== undefined) bgmData = data.bgmData;
          if(data.bgmFileName !== undefined) bgmFileName = data.bgmFileName;
          if(data.bgmVolume !== undefined) bgmVolume = data.bgmVolume;
          if(data.theme) { Object.assign(theme, data.theme); applyTheme(); }
          currentSlide = 0;
          applyResolution();
          renderSlides(); renderSlidesTab();
          setStatus('프로젝트 불러오기 완료', false);
        } catch(err) {
          setStatus('파일 오류: '+err.message, false);
        }
      };
      reader.readAsText(file);
    }

    // ==========================================
    //  편집 패널 토글 + 단축키
    // ==========================================
    function toggleEditor() {
      const ed = document.getElementById('editor');
      ed.style.display = ed.style.display==='none'?'flex':'none';
      fitCanvas();
    }

    document.addEventListener('keydown', e => {
      if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
      if(e.key==='p'||e.key==='P') toggleEditor();
      if(e.key===' '){e.preventDefault(); isPlaying?stopPlay():playAll();}
      if(e.key==='ArrowRight'&&!isPlaying){currentSlide=Math.min(currentSlide+1,slides.length-1);activateSlide(currentSlide);renderSlidesTab();}
      if(e.key==='ArrowLeft'&&!isPlaying){currentSlide=Math.max(currentSlide-1,0);activateSlide(currentSlide);renderSlidesTab();}
      if((e.key==='r'||e.key==='R')&&!isPlaying) startRecord();
    });

    // ==========================================
    //  캔버스 크기 자동 조절
    // ==========================================
    function fitCanvas() {
      const area = document.getElementById('previewArea');
      const scaler = document.getElementById('canvasScaler');
      const res = getCanvasRes();
      const w = area.clientWidth, h = area.clientHeight;
      const scale = Math.min(w/res.w, h/res.h) * 0.95;
      const scaledW = res.w * scale;
      const scaledH = res.h * scale;
      scaler.style.transform = `scale(${scale})`;
      scaler.style.left = ((w - scaledW) / 2) + 'px';
      scaler.style.top = ((h - scaledH) / 2) + 'px';
    }

    window.addEventListener('resize', fitCanvas);

    // ==========================================
    //  초기화
    // ==========================================
    renderSlides();
    renderSlidesTab();
    activateSlide(0);
    setTimeout(fitCanvas, 100);
  </script>

</body>
</html>
