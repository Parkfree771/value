<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AntStreet Video Editor</title>
  <style>
    @font-face {
      font-family: 'Galmuri11';
      src: url('https://cdn.jsdelivr.net/npm/galmuri/dist/Galmuri11.woff2') format('woff2');
      font-weight: normal;
    }
    @font-face {
      font-family: 'Galmuri11';
      src: url('https://cdn.jsdelivr.net/npm/galmuri/dist/Galmuri11-Bold.woff2') format('woff2');
      font-weight: bold;
    }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; margin: 0; font-family: 'Galmuri11', monospace; color: #e0dcd8; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .main-area { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    /* === 왼쪽: 미리보기 === */
    .preview-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      position: relative;
      overflow: hidden;
    }

    /* === DOM Video Canvas === */
    .video-canvas {
      position: absolute;
      transform-origin: top left;
      overflow: hidden;
      will-change: transform;
      font-family: 'Galmuri11', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      -webkit-text-stroke: 0.3px;
      display: flex;
      flex-direction: column;
    }

    .video-header {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: relative;
      border-bottom: 4px solid;
      flex-shrink: 0;
    }

    .video-header::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        var(--scanline-color, rgba(233,69,96,0.03)) 3px,
        var(--scanline-color, rgba(233,69,96,0.03)) 4px
      );
    }

    .video-header .logo {
      width: 90px;
      height: 90px;
      image-rendering: pixelated;
    }

    .video-header .brand-text {
      font-size: 52px;
      font-weight: 900;
      font-family: 'Inter', Arial, sans-serif;
      letter-spacing: -0.5px;
      -webkit-text-stroke: 0.5px;
    }

    .video-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 70px;
      position: relative;
    }

    .slide-layer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      backface-visibility: hidden;
    }

    .slide-title {
      font-weight: bold;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: keep-all;
      width: 100%;
      -webkit-text-stroke: 0.5px;
      letter-spacing: 0.3px;
      filter: contrast(1.1);
    }

    .slide-body-text {
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: keep-all;
      margin-top: 40px;
      width: 100%;
      -webkit-text-stroke: 0.2px;
      letter-spacing: 0.2px;
      filter: contrast(1.05);
    }

    .slide-image {
      max-width: 900px;
      width: calc(100% - 140px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide-image img {
      max-width: 100%;
      max-height: 700px;
      object-fit: contain;
      border: 4px solid #3e3530;
    }

    .slide-image-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center;
      opacity: 0.3;
      pointer-events: none;
    }

    .slide-subtitle {
      font-size: 28px;
      text-align: center;
      padding-bottom: 30px;
      flex-shrink: 0;
      -webkit-text-stroke: 0.2px;
      text-shadow: 1px 1px 0px rgba(0,0,0,0.5);
    }

    .typing-cursor {
      animation: blink 0.3s step-end infinite alternate;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .fade-to-black-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: black;
      z-index: 100;
      pointer-events: none;
    }

    /* === 오른쪽: 편집 패널 === */
    .editor {
      width: 420px;
      background: #111;
      border-left: 3px solid #e94560;
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .editor-header {
      padding: 16px 20px;
      background: #1c1714;
      border-bottom: 3px solid #3e3530;
      display: flex; justify-content: space-between; align-items: center;
    }
    .editor-header h2 { color: #e94560; font-size: 18px; }

    .editor-tabs {
      display: flex;
      border-bottom: 3px solid #3e3530;
    }
    .editor-tab {
      flex: 1; padding: 10px;
      background: #1c1714; color: #a09890;
      border: none; cursor: pointer;
      font-family: 'Galmuri11', monospace; font-size: 13px;
      border-right: 2px solid #3e3530;
    }
    .editor-tab:last-child { border-right: none; }
    .editor-tab.active { background: #2e2722; color: #e94560; }

    .editor-content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .editor-content h3 { color: #e94560; font-size: 14px; margin-top: 6px; }
    .editor-content label { font-size: 12px; color: #a09890; }

    .editor-content textarea,
    .editor-content input[type="text"] {
      width: 100%; background: #1c1714;
      border: 2px solid #3e3530; color: #e0dcd8;
      font-family: 'Galmuri11', monospace; font-size: 13px;
      padding: 8px; resize: vertical;
    }
    .editor-content input[type="number"],
    .editor-content select {
      width: 100%; background: #1c1714;
      border: 2px solid #3e3530; color: #e0dcd8;
      font-family: 'Galmuri11', monospace; font-size: 13px;
      padding: 6px 8px;
    }
    .editor-content input[type="range"] {
      width: 100%; accent-color: #e94560;
    }

    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn {
      font-family: 'Galmuri11', monospace; font-size: 12px;
      padding: 8px 12px; border: 3px solid; cursor: pointer; font-weight: bold;
    }
    .btn-primary { background: #DC2626; color: white; border-color: #991b1b; flex: 1; }
    .btn-primary:hover { background: #EF4444; }
    .btn-secondary { background: #1c1714; color: #e94560; border-color: #e94560; flex: 1; }
    .btn-ghost { background: #222; color: #aaa; border-color: #444; }
    .btn-success { background: #16a34a; color: white; border-color: #15803d; flex: 1; font-size: 14px; }
    .btn-success:hover { background: #22c55e; }
    .btn-danger { background: #DC2626; color: white; border-color: #991b1b; }
    .btn-sm { padding: 5px 8px; font-size: 11px; }

    .btn-record.recording { animation: recPulse 1s ease-in-out infinite; }
    @keyframes recPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    /* 슬라이드 목록 */
    .slide-list { display: flex; flex-direction: column; gap: 4px; max-height: 240px; overflow-y: auto; }
    .slide-item {
      padding: 8px 10px;
      background: #1c1714; border: 2px solid #3e3530;
      font-size: 11px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
    }
    .slide-item.active { border-color: #e94560; background: #2e2722; }
    .slide-item:hover { border-color: #a09890; }
    .slide-item .drag-handle {
      cursor: grab; color: #555; font-size: 14px; flex-shrink: 0; user-select: none;
    }
    .slide-item .slide-thumb {
      width: 28px; height: 28px; border: 2px solid #3e3530; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: #888;
    }
    .slide-item .slide-num {
      background: #3e3530; color: #a09890;
      padding: 2px 6px; font-size: 10px; flex-shrink: 0;
    }
    .slide-item.active .slide-num { background: #e94560; color: white; }
    .slide-item .slide-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .slide-item .slide-type { font-size: 9px; color: #666; flex-shrink: 0; }
    .slide-item .slide-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .slide-item .slide-actions button {
      background: none; border: 1px solid #3e3530; color: #a09890;
      font-size: 10px; padding: 2px 5px; cursor: pointer;
      font-family: 'Galmuri11', monospace;
    }
    .slide-item .slide-actions button:hover { border-color: #e94560; color: #e94560; }

    /* 이미지 업로드 */
    .image-upload-zone {
      border: 3px dashed #3e3530;
      padding: 20px; text-align: center;
      cursor: pointer; color: #666; font-size: 12px;
      transition: border-color 0.2s;
    }
    .image-upload-zone:hover { border-color: #e94560; color: #a09890; }
    .image-upload-zone.has-image {
      border-style: solid; border-color: #3e3530;
      padding: 8px;
    }
    .image-upload-zone img {
      max-width: 100%; max-height: 150px;
      object-fit: contain;
    }

    .color-row {
      display: flex; gap: 8px; align-items: center;
    }
    .color-row input[type="color"] {
      width: 36px; height: 30px; border: 2px solid #3e3530;
      background: #1c1714; cursor: pointer; padding: 2px;
    }

    .divider {
      border: none; border-top: 2px solid #3e3530; margin: 4px 0;
    }

    .status-bar {
      padding: 10px 20px;
      background: #1c1714;
      border-top: 3px solid #3e3530;
      font-size: 12px; color: #a09890;
      text-align: center;
    }
    .status-bar.recording { border-top-color: #DC2626; color: #EF4444; }

    /* Collapsible sections */
    .collapsible-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; padding: 6px 0; user-select: none;
    }
    .collapsible-header h3 { margin: 0; }
    .collapsible-header .toggle-icon { color: #666; font-size: 12px; }
    .collapsible-body { overflow: hidden; }
    .collapsible-body.collapsed { display: none; }

    /* Mini inline row */
    .inline-row { display: flex; gap: 6px; align-items: center; }
    .inline-row label { flex-shrink: 0; white-space: nowrap; }
    .inline-row input, .inline-row select { flex: 1; min-width: 0; }

    /* === Timeline bar === */
    .timeline-bar {
      height: 40px;
      background: #111;
      border-top: 3px solid #3e3530;
      display: flex;
      align-items: stretch;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .timeline-block {
      flex-shrink: 0;
      height: 100%;
      border-right: 1px solid #0a0a0a;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #a09890;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .timeline-block:hover { filter: brightness(1.3); }
    .timeline-block.active { box-shadow: inset 0 -3px 0 #e94560; }
    .timeline-playhead {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      background: #e94560;
      z-index: 2;
      pointer-events: none;
      transition: left 0.3s linear;
    }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1c1714; }
    ::-webkit-scrollbar-thumb { background: #3e3530; }
    ::-webkit-scrollbar-thumb:hover { background: #e94560; }

    /* OBS Recording Mode */
    body.obs-mode {
      overflow: hidden;
    }
    body.obs-mode .editor {
      display: none !important;
    }
    body.obs-mode .timeline-bar {
      display: none !important;
    }
    body.obs-mode .preview-area {
      flex: 1;
      width: 100vw;
      height: 100vh;
    }
    body.obs-mode .main-area {
      width: 100vw;
      height: 100vh;
    }

    .obs-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: #DC2626;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      z-index: 9999;
      font-family: 'Galmuri11', monospace;
    }

    .obs-controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      gap: 12px;
    }

    .obs-controls .btn {
      font-size: 16px;
      padding: 12px 30px;
    }
  </style>
</head>
<body>

  <div class="main-area">
    <!-- 미리보기 영역: DOM 기반 -->
    <div class="preview-area" id="previewArea">
      <div id="videoCanvas" class="video-canvas">
        <div class="video-header" id="videoHeader">
          <img class="logo" src="/logo.png" alt="logo">
          <span class="brand-text" id="brandText">AntStreet Report</span>
        </div>
        <div class="video-body" id="videoBody">
          <div class="slide-image-bg" id="slideImageBg" style="display:none;"></div>
          <div class="slide-image" id="slideImageTop" style="display:none;"></div>
          <div class="slide-layer" id="slideLayer">
            <div class="slide-title" id="slideTitle"></div>
            <div class="slide-body-text" id="slideBodyText"></div>
          </div>
          <div class="slide-image" id="slideImageCenter" style="display:none;"></div>
        </div>
        <div class="slide-subtitle" id="slideSubtitle"></div>
        <div class="fade-to-black-overlay" id="fadeOverlay" style="display:none;"></div>
      </div>
    </div>

    <!-- 편집 패널 -->
    <div class="editor" id="editor">
      <div class="editor-header">
        <h2>AntStreet Video Editor</h2>
        <button class="btn btn-sm btn-ghost" onclick="toggleEditor()">숨기기(P)</button>
      </div>

      <div class="editor-tabs">
        <button class="editor-tab active" onclick="switchTab('slides')" id="tabSlides">슬라이드</button>
        <button class="editor-tab" onclick="switchTab('style')" id="tabStyle">스타일</button>
        <button class="editor-tab" onclick="switchTab('export')" id="tabExport">녹화/내보내기</button>
      </div>

      <div class="editor-content" id="editorContent">
        <!-- 탭 내용이 여기에 -->
      </div>

      <div class="status-bar" id="statusBar">준비 완료</div>
    </div>
  </div>

  <!-- Timeline bar -->
  <div class="timeline-bar" id="timelineBar"></div>

  <!-- Hidden inputs -->
  <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImage(event)">
  <input type="file" id="projectInput" accept=".json" style="display:none" onchange="handleProject(event)">
  <input type="file" id="bgmInput" accept="audio/mp3,audio/wav,audio/*" style="display:none" onchange="handleBGM(event)">
  <input type="file" id="importTextInput" accept=".txt" style="display:none" onchange="handleImportText(event)">

  <script>
    // ==========================================
    //  데이터
    // ==========================================
    const defaultSlideProps = {
      title: "새 슬라이드",
      body: "내용을 입력하세요",
      layout: "text-only",
      image: null,
      titleColor: "#e94560",
      bodyColor: "#e0dcd8",
      bgColor: "#1c1714",
      durationOverride: 0,
      titleFontSize: 60,
      bodyFontSize: 38,
      textAlign: "center",
      showHeader: true,
      animation: "typing",
      subtitle: "",
      subtitleColor: "#a09890"
    };

    function ensureSlideDefaults(s) {
      return Object.assign({}, defaultSlideProps, s);
    }

    let slides = [
      { title:"제목을 입력하세요", body:"", layout:"text-only", image:null }
    ].map(ensureSlideDefaults);

    let currentSlide = 0;
    let isPlaying = false;
    let animationId = null;
    let isOBSMode = false;

    // YouTube 업로드
    let ytAccessToken = null;
    let ytClientId = localStorage.getItem('yt_client_id') || '';
    let lastExportedBlob = null;

    let settings = {
      typeSpeed: 50,
      slidePause: 2000,
      soundType: 'mechanical',
      transition: 'fade',
      fadeToBlack: false,
      resolution: '1080x1920',
      videoBitrate: 8000000
    };

    // 테마 설정
    let theme = {
      frameBg: '#1c1714',
      headerBg: '#1c1714',
      headerBorder: '#e94560',
      defaultTitleColor: '#e94560',
      defaultBodyColor: '#e0dcd8',
      defaultBgColor: '#1c1714',
      subtitleColor: '#a09890',
      brandFont: 'inter'
    };

    // isExporting kept for compatibility
    let isExporting = false;

    // ==========================================
    //  이미지 프리로드
    // ==========================================
    function preloadSlideImages() {
      slides.forEach(s => {
        if(s.image && !s._imgEl) {
          const img = new Image();
          img.src = s.image;
          img.onload = () => { s._imgEl = img; };
          img.onerror = () => { s._imgEl = null; };
        } else if(!s.image) {
          s._imgEl = null;
        }
      });
    }

    // ==========================================
    //  테마
    // ==========================================
    function applyTheme() {
      defaultSlideProps.titleColor = theme.defaultTitleColor;
      defaultSlideProps.bodyColor = theme.defaultBodyColor;
      defaultSlideProps.bgColor = theme.defaultBgColor;
      defaultSlideProps.subtitleColor = theme.subtitleColor;
      renderCurrentSlide();
    }

    function applyThemeToAll() {
      slides.forEach(s => {
        s.titleColor = theme.defaultTitleColor;
        s.bodyColor = theme.defaultBodyColor;
        s.bgColor = theme.defaultBgColor;
        s.subtitleColor = theme.subtitleColor;
      });
      applyTheme();
    }

    function resetTheme() {
      theme = {
        frameBg: '#1c1714', headerBg: '#1c1714', headerBorder: '#e94560',
        defaultTitleColor: '#e94560', defaultBodyColor: '#e0dcd8',
        defaultBgColor: '#1c1714', subtitleColor: '#a09890', brandFont: 'inter'
      };
      applyTheme();
    }

    const themePresets = {
      dark:     { frameBg:'#1c1714', headerBg:'#1c1714', headerBorder:'#e94560', defaultTitleColor:'#e94560', defaultBodyColor:'#e0dcd8', defaultBgColor:'#1c1714', subtitleColor:'#a09890', brandFont:'inter' },
      light:    { frameBg:'#f5f0eb', headerBg:'#f5f0eb', headerBorder:'#991b1b', defaultTitleColor:'#991b1b', defaultBodyColor:'#2e2722', defaultBgColor:'#f5f0eb', subtitleColor:'#7a7068', brandFont:'inter' },
      midnight: { frameBg:'#0f172a', headerBg:'#0f172a', headerBorder:'#60a5fa', defaultTitleColor:'#60a5fa', defaultBodyColor:'#e2e8f0', defaultBgColor:'#0f172a', subtitleColor:'#94a3b8', brandFont:'inter' },
      forest:   { frameBg:'#14532d', headerBg:'#14532d', headerBorder:'#4ade80', defaultTitleColor:'#4ade80', defaultBodyColor:'#dcfce7', defaultBgColor:'#14532d', subtitleColor:'#86efac', brandFont:'inter' },
      sunset:   { frameBg:'#431407', headerBg:'#431407', headerBorder:'#fb923c', defaultTitleColor:'#fb923c', defaultBodyColor:'#fed7aa', defaultBgColor:'#431407', subtitleColor:'#fdba74', brandFont:'inter' },
      mono:     { frameBg:'#1a1a1a', headerBg:'#1a1a1a', headerBorder:'#a0a0a0', defaultTitleColor:'#ffffff', defaultBodyColor:'#c0c0c0', defaultBgColor:'#1a1a1a', subtitleColor:'#808080', brandFont:'inter' }
    };

    function loadPreset(name) {
      const p = themePresets[name];
      if(!p) return;
      theme = Object.assign({}, p);
      applyThemeToAll();
    }

    // BGM state
    let bgmData = null;
    let bgmFileName = '';
    let bgmVolume = 50;
    let bgmAudioEl = null;

    // ==========================================
    //  오디오
    // ==========================================
    let audioCtx = null;
    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }

    function playTypeSound() {
      if(settings.soundType==='none'||!audioCtx) return;
      const osc=audioCtx.createOscillator(), gain=audioCtx.createGain(), now=audioCtx.currentTime;
      osc.connect(gain); gain.connect(audioCtx.destination);
      if(settings.soundType==='mechanical'){
        osc.type='square'; osc.frequency.setValueAtTime(800+Math.random()*400,now);
        osc.frequency.exponentialRampToValueAtTime(200,now+0.03);
        gain.gain.setValueAtTime(0.15,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.05);
        osc.start(now); osc.stop(now+0.05);
      } else if(settings.soundType==='soft'){
        osc.type='sine'; osc.frequency.setValueAtTime(600+Math.random()*200,now);
        gain.gain.setValueAtTime(0.08,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.04);
        osc.start(now); osc.stop(now+0.04);
      } else if(settings.soundType==='retro'){
        osc.type='square'; osc.frequency.setValueAtTime(1200+Math.random()*600,now);
        osc.frequency.setValueAtTime(400+Math.random()*200,now+0.02);
        gain.gain.setValueAtTime(0.12,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.06);
        osc.start(now); osc.stop(now+0.06);
      }
    }

    function startBGM() {
      if(!bgmData) return;
      stopBGM();
      bgmAudioEl = new Audio(bgmData);
      bgmAudioEl.loop = true;
      bgmAudioEl.volume = bgmVolume / 100;
      bgmAudioEl.play().catch(()=>{});
    }

    function stopBGM() {
      if(bgmAudioEl) {
        bgmAudioEl.pause();
        bgmAudioEl.currentTime = 0;
        bgmAudioEl = null;
      }
    }

    function handleBGM(e) {
      const file = e.target.files[0];
      if(!file) return;
      bgmFileName = file.name;
      const reader = new FileReader();

    // ==========================================
    //  DOM 애니메이션
    // ==========================================
    function wait(ms) { return new Promise(r => { animationId = setTimeout(r, ms); }); }

    function typeText(element, text, speed) {
      return new Promise(resolve => {
        let i = 0;
        const cursor = document.createElement('span');
        cursor.className = 'typing-cursor';
        cursor.textContent = '|';

        function tick() {
          if(!isPlaying) { cursor.remove(); resolve(); return; }
          if(i < text.length) {
            if(text[i] !== '\n') playTypeSound();
            i++;
            element.textContent = text.substring(0, i);
            element.appendChild(cursor);
            animationId = setTimeout(tick, speed + Math.random() * (speed * 0.5));
          } else {
            cursor.remove();
            resolve();
          }
        }
        tick();
      });
    }

    function fadeInElement(element, duration) {
      return new Promise(resolve => {
        const start = performance.now();
        element.style.opacity = '0';

        function step() {
          if(!isPlaying) { element.style.opacity = '1'; resolve(); return; }
          const t = Math.min(1, (performance.now() - start) / duration);
          element.style.opacity = String(t);
          if(t < 1) animationId = requestAnimationFrame(step);
          else resolve();
        }
        step();
      });
    }

    function slideUpElement(element, duration) {
      return new Promise(resolve => {
        const start = performance.now();
        element.style.opacity = '0';
        element.style.transform = 'translateY(40px)';

        function step() {
          if(!isPlaying) { element.style.opacity = '1'; element.style.transform = ''; resolve(); return; }
          const t = Math.min(1, (performance.now() - start) / duration);
          const ease = 1 - Math.pow(1 - t, 3);
          element.style.opacity = String(ease);
          element.style.transform = `translateY(${40 * (1 - ease)}px)`;
          if(t < 1) animationId = requestAnimationFrame(step);
          else resolve();
        }
        step();
      });
    }

    function fadeToBlackAnim(fadeIn, duration) {
      return new Promise(resolve => {
        const overlay = document.getElementById('fadeOverlay');
        overlay.style.display = 'block';
        const start = performance.now();

        function step() {
          if(!isPlaying) { resolve(); return; }
          const t = Math.min(1, (performance.now() - start) / duration);
          overlay.style.opacity = fadeIn ? String(t) : String(1 - t);
          if(t < 1) animationId = requestAnimationFrame(step);
          else {
            if(!fadeIn) overlay.style.display = 'none';
            resolve();
          }
        }
        step();
      });
    }

    // ==========================================
    //  슬라이드 렌더링
    // ==========================================
    function renderSlides() {
      slides = slides.map(s => ensureSlideDefaults(s));
      preloadSlideImages();
      renderTimeline();
    }

    function activateSlide(index) {
      currentSlide = index;
      renderCurrentSlide();
      renderTimeline();
    }

    // ==========================================
    //  Timing tracking
    // ==========================================
    let playStartTime = 0;
    let totalEstDuration = 0;

    function estimateSlideDuration(s) {
      s = ensureSlideDefaults(s);
      if(s.durationOverride > 0) return s.durationOverride;
      if(s.animation === 'typing') {
        const titleLen = (s.title || '').length;
        const bodyLen = (s.body || '').length;
        const titleTime = titleLen * settings.typeSpeed * 1.25;
        const bodyTime = bodyLen * settings.typeSpeed * 0.8 * 1.25;
        return 400 + titleTime + 300 + bodyTime + settings.slidePause;
      }
      return 400 + 800 + 300 + 600 + settings.slidePause;
    }

    function getTotalDuration() {
      return slides.reduce((acc, s) => acc + estimateSlideDuration(s), 0) + 2000;
    }

    // ==========================================
    //  슬라이드 재생 (DOM 기반)
    // ==========================================
    async function playSlide(index) {
      const s = ensureSlideDefaults(slides[index]);
      currentSlide = index;

      const titleEl = document.getElementById('slideTitle');
      const bodyEl = document.getElementById('slideBodyText');

      // Fade to black transition
      if(settings.fadeToBlack && index > 0) {
        await fadeToBlackAnim(true, 400);

        // Switch slide while black
        renderCurrentSlide();
        titleEl.textContent = '';
        bodyEl.textContent = '';
        bodyEl.style.display = s.body ? 'block' : 'none';
        await wait(100);

        await fadeToBlackAnim(false, 400);
      } else {
        renderCurrentSlide();
        titleEl.textContent = '';
        bodyEl.textContent = '';
        bodyEl.style.display = s.body ? 'block' : 'none';
      }

      const anim = s.animation || 'typing';

      // Duration override (non-typing)
      if(s.durationOverride > 0 && anim !== 'typing') {
        await wait(200);
        if(s.title) {
          titleEl.textContent = s.title;
          if(anim === 'fade-in') { bodyEl.style.opacity = '0'; await fadeInElement(titleEl, 800); }
          else if(anim === 'slide-up') { bodyEl.style.opacity = '0'; await slideUpElement(titleEl, 600); }
        }
        await wait(200);
        if(s.body) {
          bodyEl.textContent = s.body;
          if(anim === 'fade-in') await fadeInElement(bodyEl, 800);
          else if(anim === 'slide-up') await slideUpElement(bodyEl, 600);
        }
        const remaining = Math.max(0, s.durationOverride - 1200);
        await wait(remaining);
        return;
      }

      // Normal mode
      await wait(400);

      if(anim === 'typing') {
        if(s.title) {
          await typeText(titleEl, s.title, settings.typeSpeed);
          await wait(300);
        }
        if(s.body) {
          bodyEl.style.display = 'block';
          await typeText(bodyEl, s.body, settings.typeSpeed * 0.8);
        }
      } else if(anim === 'fade-in') {
        if(s.title) {
          titleEl.textContent = s.title;
          bodyEl.style.opacity = '0';
          await fadeInElement(titleEl, 800);
        }
        await wait(300);
        if(s.body) {
          bodyEl.textContent = s.body;
          await fadeInElement(bodyEl, 800);
        }
      } else if(anim === 'slide-up') {
        if(s.title) {
          titleEl.textContent = s.title;
          bodyEl.style.opacity = '0';
          await slideUpElement(titleEl, 600);
        }
        await wait(300);
        if(s.body) {
          bodyEl.textContent = s.body;
          await slideUpElement(bodyEl, 600);
        }
      } else { // instant
        titleEl.textContent = s.title || '';
        bodyEl.textContent = s.body || '';
      }
    }

    async function playAll() {
      initAudio();
      isPlaying = true;
      setStatus('재생 중...', false);
      startBGM();

      playStartTime = Date.now();
      totalEstDuration = getTotalDuration();

      for(let i=0; i<slides.length; i++) {
        if(!isPlaying) break;
        currentSlide = i;
        if(document.getElementById('tabSlides') && document.getElementById('tabSlides').classList.contains('active')) renderSlidesTab();
        await playSlide(i);
        if(i < slides.length-1 && isPlaying) await wait(slides[i].durationOverride > 0 ? 0 : settings.slidePause);
      }
      if(isPlaying) await wait(2000);
      isPlaying = false;
      stopBGM();
      setStatus('재생 완료', false);

      // OBS mode: auto-return to edit mode
      if(isOBSMode) {
        exitOBSMode();
      }
    }

    function stopPlay() {
      isPlaying = false;
      if(animationId) {
        clearTimeout(animationId);
        cancelAnimationFrame(animationId);
        animationId = null;
      }
      stopBGM();
    }

    function resetPreview() {
      stopPlay();
      activateSlide(currentSlide);
    }

    // ==========================================
    //  Timeline
    // ==========================================
    function renderTimeline() {
      const bar = document.getElementById('timelineBar');
      if(!bar) return;
      let html = '';
      const totalDur = getTotalDuration();
      slides.forEach((s, i) => {
        const dur = estimateSlideDuration(s);
        const pct = (dur / totalDur) * 100;
        const bg = s.bgColor || '#1c1714';
        const isActive = i === currentSlide;
        html += `<div class="timeline-block ${isActive?'active':''}" style="width:${pct}%;background:${bg};min-width:24px;" onclick="jumpToSlide(${i})" title="슬라이드 ${i+1}: ${(s.title||'').replace(/\n/g,' ').substring(0,20)}"><span>${i+1}</span></div>`;
      });
      bar.innerHTML = html;
    }

    function jumpToSlide(i) {
      if(isPlaying) return;
      currentSlide = i;
      activateSlide(i);
      if(document.getElementById('tabSlides').classList.contains('active')) renderSlidesTab();
    }

    function toggleSection(name) {
      collapsedSections[name] = !collapsedSections[name];
      const el = document.getElementById('section-' + name);
      if(el) el.classList.toggle('collapsed', !!collapsedSections[name]);
      const icon = document.getElementById('icon-' + name);
      if(icon) icon.textContent = collapsedSections[name] ? '+' : '-';
    }

    function sectionHTML(name, title, content, defaultOpen) {
      if(defaultOpen === undefined) defaultOpen = true;
      const collapsed = collapsedSections[name] !== undefined ? collapsedSections[name] : !defaultOpen;
      if(collapsedSections[name] === undefined) collapsedSections[name] = !defaultOpen;
      return `
        <div class="collapsible-header" onclick="toggleSection('${name}')">
          <h3>${title}</h3>
          <span class="toggle-icon" id="icon-${name}">${collapsed ? '+' : '-'}</span>
        </div>
        <div class="collapsible-body ${collapsed?'collapsed':''}" id="section-${name}">

      // Controls

      controls.className = 'obs-controls';
      controls.id = 'obsControls';
      controls.innerHTML = `
        <button class="btn btn-success" onclick="obsStartPlay()">\u25B6 재생 시작</button>
        <button class="btn btn-danger" onclick="exitOBSMode()">ESC 나가기</button>
      `;

      fitVideoCanvas();

    function exitOBSMode() {
      isOBSMode = false;
      stopPlay();
      document.body.classList.remove('obs-mode');

      const banner = document.getElementById('obsBanner');
      if(banner) banner.remove();
      const controls = document.getElementById('obsControls');

      fitVideoCanvas();
      renderCurrentSlide();

    function obsStartPlay() {
      // Hide controls during playback
      const controls = document.getElementById('obsControls');
      if(controls) controls.style.display = 'none';
      const banner = document.getElementById('obsBanner');
      if(banner) banner.innerHTML = '\u25CF REC 녹화 중...';

      initAudio();
      playAll().then(() => {
        // Show controls again when done (if still in OBS mode it will auto-exit)
        if(isOBSMode) {

          if(banner) banner.innerHTML = '\u25CF REC 재생 완료';

    function deleteSlide(i) {
      if(slides.length<=1) return;

    }

    function moveSlide(i, dir) {
      const j = i+dir;
      if(j<0||j>=slides.length) return;
      [slides[i], slides[j]] = [slides[j], slides[i]];
      currentSlide = j;
      renderSlides(); activateSlide(currentSlide); renderSlidesTab();
    }

    function updateField(field, value) {

    function importSlidesFromText() {
      const text = prompt('여러 줄의 텍스트를 입력하세요.\n빈 줄로 슬라이드를 구분합니다.\n각 슬라이드의 첫 줄이 제목, 나머지가 본문이 됩니다.');
      if(!text) return;
      const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim());
      if(paragraphs.length === 0) return;
      const newSlides = paragraphs.map(p => {
        const lines = p.trim().split('\n');
        return Object.assign({}, defaultSlideProps, { title: lines[0] || '슬라이드', body: lines.slice(1).join('\n') || '' });
      });
      slides = slides.concat(newSlides);
      currentSlide = slides.length - newSlides.length;
      renderSlides(); activateSlide(currentSlide); renderSlidesTab();
      setStatus(`${newSlides.length}개 슬라이드를 가져왔습니다`, false);
    }

    async function ytAuth() {
      if(!ytClientId) { ytSetStatus('Client ID를 먼저 입력하세요.'); return null; }
      const redirectUri = window.location.origin + window.location.pathname;
      const scope = 'https://www.googleapis.com/auth/youtube.upload';
      if(ytAccessToken) {
        try { const r = await fetch('https://www.googleapis.com/oauth2/v1/tokeninfo?access_token=' + ytAccessToken); if(r.ok) return ytAccessToken; } catch(e) {}
        ytAccessToken = null;
      }
      const hash = window.location.hash;
      if(hash.includes('access_token=')) {
        const params = new URLSearchParams(hash.substring(1));
        const token = params.get('access_token');
        if(token) { ytAccessToken = token; window.history.replaceState(null, '', window.location.pathname + window.location.search); return token; }
      }
      return new Promise((resolve) => {
        const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' + new URLSearchParams({ client_id: ytClientId, redirect_uri: redirectUri, response_type: 'token', scope, include_granted_scopes: 'true', prompt: 'consent' }).toString();
        const authWin = window.open(authUrl, 'GoogleAuth', 'width=500,height=700');
        if(!authWin) { ytSetStatus('팝업이 차단되었습니다.'); resolve(null); return; }
        const checkInterval = setInterval(() => {
          try {
            if(authWin.closed) { clearInterval(checkInterval); resolve(null); return; }
            const url = authWin.location.href;
            if(url.includes('access_token=')) {
              const h = new URL(url).hash;
              const p = new URLSearchParams(h.substring(1));
              const t = p.get('access_token');
              clearInterval(checkInterval); authWin.close();
              if(t) { ytAccessToken = t; resolve(t); } else resolve(null);
            }
          } catch(e) {}
        }, 500);
        setTimeout(() => { clearInterval(checkInterval); if(!authWin.closed) authWin.close(); resolve(null); }, 300000);
      });
    }

    async function uploadToYouTube(videoBlob) {
      const token = await ytAuth();
      if(!token) { ytSetStatus('YouTube 인증 실패'); return false; }
      const title = document.getElementById('ytTitle')?.value || 'AntStreet Report';
      const description = document.getElementById('ytDesc')?.value || '';
      const privacy = document.getElementById('ytPrivacy')?.value || 'private';
      ytSetStatus('YouTube 업로드 시작...');
      const metadata = { snippet: { title, description, categoryId: '22' }, status: { privacyStatus: privacy, selfDeclaredMadeForKids: false } };
      try {
        const initResp = await fetch('https://www.googleapis.com/upload/youtube/v3/videos?uploadType=resumable&part=snippet,status', {
          method: 'POST', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json; charset=UTF-8', 'X-Upload-Content-Length': videoBlob.size, 'X-Upload-Content-Type': videoBlob.type || 'video/mp4' }, body: JSON.stringify(metadata)
        });
        if(!initResp.ok) { ytSetStatus('업로드 초기화 실패: ' + await initResp.text()); return false; }
        const uploadUrl = initResp.headers.get('Location');
        if(!uploadUrl) { ytSetStatus('업로드 URL 없음'); return false; }
        const chunkSize = 5 * 1024 * 1024;
        let offset = 0;
        const totalSize = videoBlob.size;
        while(offset < totalSize) {
          const end = Math.min(offset + chunkSize, totalSize);
          const chunk = videoBlob.slice(offset, end);
          ytSetStatus(`YouTube 업로드 중... ${Math.round((offset/totalSize)*100)}%`);
          const uploadResp = await fetch(uploadUrl, { method: 'PUT', headers: { 'Content-Range': `bytes ${offset}-${end-1}/${totalSize}`, 'Content-Type': videoBlob.type || 'video/mp4' }, body: chunk });
          if(uploadResp.status === 200 || uploadResp.status === 201) {
            const result = await uploadResp.json();
            ytSetStatus(`업로드 완료! https://youtu.be/${result.id}`);
            setStatus(`YouTube 업로드 완료! ID: ${result.id}`, false);
            return true;
          } else if(uploadResp.status === 308) {
            const range = uploadResp.headers.get('Range');
            offset = range ? parseInt(range.split('-')[1]) + 1 : end;
          } else { ytSetStatus('업로드 실패: ' + await uploadResp.text()); return false; }
        }
        return true;
      } catch(e) { ytSetStatus('업로드 오류: ' + e.message); return false; }
    }

    async function uploadSelectedFile() {
      const fileInput = document.getElementById('ytFileInput');
      if(!fileInput || !fileInput.files[0]) { ytSetStatus('녹화 파일을 선택하세요.'); return; }

      ytSetStatus('Google 인증 진행 중...');

      if(!token) { ytSetStatus('인증 실패.'); return; }
      ytSetStatus('인증 완료! 업로드 시작...');
      await uploadToYouTube(fileInput.files[0]);
    }

      const a = document.createElement('a');

      a.download = `AntStreet_Project_${new Date().toISOString().slice(0,10)}.json`;
      a.click();

    function handleProject(e) {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if(data.slides) slides = data.slides.map(ensureSlideDefaults);
          if(data.settings) Object.assign(settings, data.settings);
          if(data.bgmData !== undefined) bgmData = data.bgmData;
          if(data.bgmFileName !== undefined) bgmFileName = data.bgmFileName;
          if(data.bgmVolume !== undefined) bgmVolume = data.bgmVolume;
          if(data.theme) { Object.assign(theme, data.theme); applyTheme(); }
          currentSlide = 0;
          applyResolution();
          renderSlides(); activateSlide(0); renderSlidesTab();
          setStatus('프로젝트 불러오기 완료', false);
        } catch(err) {
          setStatus('파일 오류: '+err.message, false);
        }
      };
      reader.readAsText(file);
    }

    document.addEventListener('keydown', e => {
      if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
      if(e.key==='Escape' && isOBSMode) { exitOBSMode(); return; }
      if(e.key==='p'||e.key==='P') toggleEditor();
      if(e.key===' '){e.preventDefault(); isPlaying?stopPlay():playAll();}
      if(e.key==='ArrowRight'&&!isPlaying){currentSlide=Math.min(currentSlide+1,slides.length-1);activateSlide(currentSlide);renderSlidesTab();}
      if(e.key==='ArrowLeft'&&!isPlaying){currentSlide=Math.max(currentSlide-1,0);activateSlide(currentSlide);renderSlidesTab();}
    });

    // ==========================================
    //  DOM 비디오 캔버스 크기 자동 조절
    // ==========================================
    function fitVideoCanvas() {
      const area = document.getElementById('previewArea');
      const vc = document.getElementById('videoCanvas');
      const res = getCanvasRes();
      const w = area.clientWidth, h = area.clientHeight;
      const scale = Math.min(w / res.w, h / res.h) * 0.95;

      vc.style.width = res.w + 'px';
      vc.style.height = res.h + 'px';
      vc.style.transform = `scale(${scale})`;
      vc.style.transformOrigin = 'top left';
      vc.style.left = ((w - res.w * scale) / 2) + 'px';
      vc.style.top = ((h - res.h * scale) / 2) + 'px';
    }

    window.addEventListener('resize', fitVideoCanvas);

    // ==========================================
    //  초기화
    // ==========================================
    document.fonts.ready.then(() => {
      renderSlides();
      renderSlidesTab();
      activateSlide(0);
      fitVideoCanvas();
    });

    // Fallback in case fonts.ready is slow
    setTimeout(() => {
      renderSlides();
      renderSlidesTab();
      activateSlide(0);
      fitVideoCanvas();
    }, 500);
  </script>

</body>
</html>
